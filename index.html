<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Guardian: Voidrunner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Skranji:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-main: 'Skranji', cursive;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #051a05;
            font-family: var(--font-main);
            color: #e8f5e9;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.15), rgba(0,0,0,0.15)), url('https://raw.githubusercontent.com/precidoboss/voidrunner/main/gamebackground2.png');
            background-size: cover;
            background-position: center bottom;
        }

        .character-viewport {
            position: absolute;
            width: 350px; 
            height: 350px;
            overflow: hidden; 
            display: block;
            pointer-events: none;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }

        .sprite-layer {
            height: 350px;
            image-rendering: pixelated;
            background-repeat: no-repeat;
            background-size: auto 100%; 
            will-change: transform;
            backface-visibility: hidden;
        }

        .hero { z-index: 50; }
        .enemy { z-index: 40; }

        .forest-panel {
            background: rgba(45, 90, 39, 0.9);
            border: 4px solid #4e342e;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
        }

        .forest-btn {
            background: linear-gradient(#5d4037, #3e2723);
            border: 2px solid #8bc34a;
            padding: 10px 25px;
            color: #fff;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            text-shadow: 2px 2px 4px #000;
            border-radius: 8px;
        }

        .forest-btn:hover {
            transform: scale(1.05);
            background: linear-gradient(#8bc34a, #558b2f);
        }

        .forest-btn.active {
            background: #8bc34a;
            border-color: #fff;
            color: #1b3022;
        }

        .health-container {
            width: 300px;
            height: 35px;
            background: #1a1a1a;
            border: 3px solid #3e2723;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            width: 100%;
            transition: width 0.3s ease-out;
        }

        .health-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
            text-shadow: 1px 1px 2px #000;
        }

        .cooldown-indicator {
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.6);
            border: 2px solid #4e342e;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .cooldown-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: rgba(139, 195, 74, 0.4);
            transition: height linear;
        }

        .damage-popup {
            position: absolute;
            color: #ffeb3b;
            font-weight: bold;
            font-size: 3rem;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            text-shadow: 3px 3px 0px #b71c1c;
            z-index: 1000;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.5); opacity: 0; }
        }

        .shake { animation: shake 0.2s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translate(0,0); }
            25% { transform: translate(-8px, 8px); }
            50% { transform: translate(8px, -8px); }
            75% { transform: translate(-8px, -8px); }
        }

        .stat-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 12px;
            background: #1b3022;
            border-radius: 6px;
        }
        .stat-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: #8bc34a;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Main Menu -->
        <div id="main-menu" class="absolute inset-0 flex flex-col items-center justify-center bg-black/40 z-[300]">
            <h1 class="text-7xl mb-8 text-green-400 drop-shadow-[0_5px_5px_rgba(0,0,0,1)] text-center">
                VOID<br><span class="text-8xl">RUNNER</span>
            </h1>
            <div class="forest-panel p-10 flex flex-col gap-6 w-[450px]">
                <button onclick="showModeSettings('1v1')" class="forest-btn text-2xl">1v1 Duel</button>
                <button onclick="startGame('endless')" class="forest-btn text-2xl">Endless Woods</button>
            </div>
        </div>

        <!-- Settings -->
        <div id="settings-menu" class="absolute inset-0 flex flex-col items-center justify-center bg-black/60 hidden z-[301]">
            <div class="forest-panel p-10 flex flex-col gap-8 w-[500px]">
                <h2 class="text-4xl text-center border-b-2 border-green-800 pb-4">Duel Setup</h2>
                
                <div>
                    <label class="block mb-4 text-xl">Bot Difficulty:</label>
                    <div class="flex justify-between gap-4">
                        <button onclick="setDifficulty('easy')" class="diff-btn forest-btn flex-1 py-2" id="diff-easy">Easy</button>
                        <button onclick="setDifficulty('medium')" class="diff-btn forest-btn active flex-1 py-2" id="diff-medium">Mid</button>
                        <button onclick="setDifficulty('hard')" class="diff-btn forest-btn flex-1 py-2" id="diff-hard">Hard</button>
                    </div>
                </div>

                <div>
                    <label class="block mb-2 text-xl">Vitality: <span id="health-val" class="text-green-400">500</span></label>
                    <input type="range" id="health-slider" min="100" max="1000" value="500" step="50" class="stat-slider" 
                           oninput="document.getElementById('health-val').innerText = this.value">
                </div>

                <div>
                    <label class="block mb-4 text-xl">Rounds:</label>
                    <div class="flex justify-between gap-4">
                        <button onclick="setRounds(1)" class="round-btn forest-btn flex-1 py-2 bg-green-900 border-white" id="r1">1</button>
                        <button onclick="setRounds(3)" class="round-btn forest-btn flex-1 py-2" id="r3">3</button>
                        <button onclick="setRounds(5)" class="round-btn forest-btn flex-1 py-2" id="r5">5</button>
                    </div>
                </div>

                <div class="flex gap-4 pt-4">
                    <button onclick="backToMenu()" class="forest-btn flex-1 bg-red-900">Back</button>
                    <button onclick="startGame('1v1')" class="forest-btn flex-1 bg-green-700">Enter Grove</button>
                </div>
            </div>
        </div>

        <!-- UI -->
        <div id="ui-layer" class="absolute top-0 left-0 w-full p-6 flex justify-between items-start pointer-events-none z-[200] hidden">
            <div class="flex flex-col gap-2">
                <div class="health-container">
                    <div id="hero-hp-bar" class="health-fill"></div>
                    <div class="health-text">GUARDIAN: <span id="hero-hp-text">500/500</span></div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="cooldown-indicator" title="Attack Cooldown">
                        <div id="attack-cd-fill" class="cooldown-fill"></div>
                        <span class="text-xs text-white z-10">SWORD</span>
                    </div>
                    <span class="text-sm text-green-300">SPACE to Slash</span>
                </div>
            </div>

            <div id="round-display" class="forest-panel px-6 py-2 text-2xl hidden">
                ROUND <span id="current-round">1</span>
            </div>

            <div class="flex flex-col items-end gap-3">
                <button onclick="togglePause()" class="forest-btn px-4 py-2 pointer-events-auto">PAUSE</button>
                <div class="health-container">
                    <div id="enemy-hp-bar" class="health-fill bg-red-600"></div>
                    <div class="health-text">INVADER: <span id="enemy-hp-text">500/500</span></div>
                </div>
                <div id="score-display" class="hidden text-2xl text-yellow-400">Kills: <span id="kill-count">0</span></div>
            </div>
        </div>

        <!-- Game Screens -->
        <div id="pause-menu" class="absolute inset-0 flex flex-col items-center justify-center bg-black/70 hidden z-[400]">
            <div class="forest-panel p-10 flex flex-col gap-6">
                <h2 class="text-5xl mb-4">Time Frozen</h2>
                <button onclick="togglePause()" class="forest-btn text-2xl">Resume</button>
                <button onclick="location.reload()" class="forest-btn text-2xl bg-red-900">Surrender</button>
            </div>
        </div>

        <div id="overlay-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-black/85 hidden z-[500]">
            <h2 id="overlay-title" class="text-8xl text-yellow-400 mb-8 text-center drop-shadow-lg">VICTORY</h2>
            <div id="overlay-msg" class="text-3xl mb-12 italic">The forest breathes again.</div>
            <button onclick="location.reload()" class="forest-btn text-3xl px-16 py-6">Rebirth</button>
        </div>
    </div>

    <!-- Audio Elements -->
    <audio id="bg-music" loop>
        <source src="https://raw.githubusercontent.com/precidoboss/voidrunner/main/DavidKBD%20-%20Pink%20Bloom%20Pack%20-%2001%20-%20Pink%20Bloom.ogg" type="audio/ogg">
    </audio>
    <audio id="sfx-hit">
        <source src="https://raw.githubusercontent.com/precidoboss/voidrunner/main/26_sword_hit_1.wav" type="audio/wav">
    </audio>

    <script>
        const SPRITE_URLS = {
            IDLE: 'https://raw.githubusercontent.com/precidoboss/voidrunner/main/IDLE.png',
            RUN: 'https://raw.githubusercontent.com/precidoboss/voidrunner/main/RUN.png',
            ATTACK: 'https://raw.githubusercontent.com/precidoboss/voidrunner/main/ATTACK%201.png',
            HURT: 'https://raw.githubusercontent.com/precidoboss/voidrunner/main/HURT.png'
        };

        const FRAME_COUNTS = {
            IDLE: 6,
            RUN: 8,
            ATTACK: 6,
            HURT: 4
        };

        const FRAME_SIZE = 350; 

        let state = {
            gameActive: false,
            paused: false,
            mode: '1v1',
            difficulty: 'medium', // easy, medium, hard
            maxHp: 500,
            rounds: 1,
            currentRound: 1,
            heroScore: 0,
            enemyScore: 0,
            kills: 0,
            hero: null,
            enemies: [],
            keys: {},
            gravity: 1.2,
            groundY: 0
        };

        const DIFF_SETTINGS = {
            easy: { speed: 5, jumpChance: 0.005, attackChance: 0.03, reactionRange: 220 },
            medium: { speed: 8, jumpChance: 0.01, attackChance: 0.07, reactionRange: 160 },
            hard: { speed: 11, jumpChance: 0.02, attackChance: 0.12, reactionRange: 130 }
        };

        class Entity {
            constructor(x, y, hp, isHero = false) {
                this.x = x;
                this.y = y;
                this.hp = hp;
                this.maxHp = hp;
                this.isHero = isHero;
                this.velX = 0;
                this.velY = 0;
                this.speed = 12;
                this.jumpPower = -26; 
                this.dir = isHero ? 1 : -1;
                this.animState = 'IDLE';
                this.currentFrame = 0;
                this.animTimer = 0;
                this.attackCooldown = 0;
                this.maxAttackCooldown = 40; // Total duration of cooldown
                this.hurtTimer = 0;
                this.attackActive = false;
                this.isGrounded = true;
                
                this.viewport = document.createElement('div');
                this.viewport.className = `character-viewport ${isHero ? 'hero' : 'enemy'}`;
                
                this.spriteLayer = document.createElement('div');
                this.spriteLayer.className = 'sprite-layer';
                
                this.viewport.appendChild(this.spriteLayer);
                document.getElementById('game-container').appendChild(this.viewport);
            }

            updateAnimation() {
                let newState = 'IDLE';
                if (this.hurtTimer > 0) newState = 'HURT';
                else if (this.attackActive) newState = 'ATTACK';
                else if (!this.isGrounded) newState = 'IDLE'; 
                else if (Math.abs(this.velX) > 1.0) newState = 'RUN';

                if (newState !== this.animState) {
                    this.animState = newState;
                    this.currentFrame = 0;
                    this.spriteLayer.style.backgroundImage = `url('${SPRITE_URLS[this.animState]}')`;
                }

                let animSpeed = 5;
                if (this.animState === 'RUN') animSpeed = 4;
                if (this.animState === 'ATTACK') animSpeed = 3;

                this.animTimer++;
                if (this.animTimer > animSpeed) { 
                    this.animTimer = 0;
                    this.currentFrame = (this.currentFrame + 1) % FRAME_COUNTS[this.animState];
                }

                const offset = -(this.currentFrame * FRAME_SIZE);
                this.spriteLayer.style.width = `${FRAME_SIZE * FRAME_COUNTS[this.animState]}px`;
                this.spriteLayer.style.transform = `translate3d(${offset}px, 0, 0)`;
                this.viewport.style.transform = `translate3d(${this.x}px, ${this.y}px, 0) scaleX(${this.dir})`;
            }

            takeDamage(amt) {
                this.hp -= amt;
                this.hurtTimer = 15;
                createDamagePopup(this.x + 150, this.y + 100, amt);
                playSound('sfx-hit');
                if (this.hp < 0) this.hp = 0;
                document.getElementById('game-container').classList.add('shake');
                setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 200);
            }

            attack() {
                if (this.attackCooldown > 0) return;
                this.attackActive = true;
                this.attackCooldown = this.maxAttackCooldown;
                // Attack animation duration
                setTimeout(() => { this.attackActive = false; }, 300);
            }

            jump() {
                if (this.isGrounded) {
                    this.velY = this.jumpPower;
                    this.isGrounded = false;
                }
            }

            update() {
                if (this.hurtTimer > 0) this.hurtTimer--;
                if (this.attackCooldown > 0) this.attackCooldown--;

                this.velY += state.gravity;
                this.y += this.velY;
                this.x += this.velX;

                if (this.y > state.groundY) {
                    this.y = state.groundY;
                    this.velY = 0;
                    this.isGrounded = true;
                }
                
                if (this.x < -120) this.x = -120;
                if (this.x > window.innerWidth - 230) this.x = window.innerWidth - 230;

                this.updateAnimation();
            }

            remove() {
                this.viewport.remove();
            }
        }

        function playSound(id) {
            const sound = document.getElementById(id);
            if (sound) {
                sound.currentTime = 0;
                sound.play().catch(e => {});
            }
        }

        function createDamagePopup(x, y, amt) {
            const p = document.createElement('div');
            p.className = 'damage-popup';
            p.innerText = amt;
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            document.getElementById('game-container').appendChild(p);
            setTimeout(() => p.remove(), 800);
        }

        function showModeSettings(mode) {
            state.mode = mode;
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('settings-menu').classList.remove('hidden');
        }

        function setDifficulty(lvl) {
            state.difficulty = lvl;
            document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('diff-' + lvl).classList.add('active');
        }

        function setRounds(r) {
            state.rounds = r;
            document.querySelectorAll('.round-btn').forEach(btn => btn.classList.remove('bg-green-900', 'border-white'));
            document.getElementById('r' + r).classList.add('bg-green-900', 'border-white');
        }

        function backToMenu() {
            document.getElementById('settings-menu').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
        }

        function startGame(mode) {
            state.mode = mode;
            state.maxHp = parseInt(document.getElementById('health-slider').value);
            state.gameActive = true;
            state.groundY = window.innerHeight - 440; 

            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('settings-menu').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');

            state.hero = new Entity(150, state.groundY, state.maxHp, true);
            spawnEnemy();

            if (mode === '1v1') {
                document.getElementById('round-display').classList.remove('hidden');
            } else {
                document.getElementById('score-display').classList.remove('hidden');
            }

            // Start Music
            const music = document.getElementById('bg-music');
            music.volume = 0.5;
            music.play().catch(e => console.log("User interaction required for audio"));

            requestAnimationFrame(gameLoop);
        }

        function spawnEnemy() {
            const enemy = new Entity(window.innerWidth - 500, state.groundY, state.mode === '1v1' ? state.maxHp : 200, false);
            // Difficulty adjustment for enemies in endless mode (scaled by kills)
            if (state.mode === 'endless') {
                enemy.hp += state.kills * 10;
                enemy.maxHp = enemy.hp;
            }
            state.enemies.push(enemy);
        }

        function togglePause() {
            state.paused = !state.paused;
            document.getElementById('pause-menu').classList.toggle('hidden', !state.paused);
            const music = document.getElementById('bg-music');
            if (state.paused) music.pause(); else music.play();
        }

        function gameLoop() {
            if (!state.gameActive) return;
            if (state.paused) {
                requestAnimationFrame(gameLoop);
                return;
            }

            // Hero Controls (Up for jump, Space for attack)
            if (state.keys['arrowleft'] || state.keys['a']) {
                state.hero.velX = -state.hero.speed;
                state.hero.dir = -1;
            } else if (state.keys['arrowright'] || state.keys['d']) {
                state.hero.velX = state.hero.speed;
                state.hero.dir = 1;
            } else {
                state.hero.velX *= 0.6;
            }

            if (state.keys['arrowup'] || state.keys['w']) {
                state.hero.jump();
            }

            if (state.keys[' '] || state.keys['k'] || state.keys['z']) {
                state.hero.attack();
            }

            state.hero.update();

            // AI Loop with difficulty settings
            const ds = DIFF_SETTINGS[state.difficulty];
            state.enemies.forEach((enemy, index) => {
                const dist = state.hero.x - enemy.x;
                const absDist = Math.abs(dist);

                if (absDist > ds.reactionRange) {
                    enemy.velX = (dist > 0 ? 1 : -1) * ds.speed;
                    enemy.dir = dist > 0 ? 1 : -1;
                    if (Math.random() < ds.jumpChance) enemy.jump();
                } else {
                    enemy.velX = 0;
                    if (Math.random() < ds.attackChance) enemy.attack();
                }

                enemy.update();

                // Combat Logic
                const hitRange = 220;
                const heightDiff = Math.abs(state.hero.y - enemy.y);
                if (state.hero.attackActive && !enemy.hurtTimer && absDist < hitRange && heightDiff < 150) {
                    enemy.takeDamage(Math.floor(Math.random() * 30) + 20);
                }
                if (enemy.attackActive && !state.hero.hurtTimer && absDist < hitRange && heightDiff < 150) {
                    state.hero.takeDamage(Math.floor(Math.random() * 15) + 10);
                }

                if (enemy.hp <= 0) {
                    enemy.remove();
                    state.enemies.splice(index, 1);
                    if (state.mode === '1v1') {
                        state.heroScore++;
                        handleRoundEnd("VICTORY");
                    } else {
                        state.kills++;
                        document.getElementById('kill-count').innerText = state.kills;
                        setTimeout(spawnEnemy, 600);
                    }
                }
            });

            if (state.hero.hp <= 0) {
                if (state.mode === '1v1') {
                    state.enemyScore++;
                    handleRoundEnd("DEFEAT");
                } else {
                    handleGameOver("GROVE DESTROYED", `Kills: ${state.kills}`);
                }
            }

            updateUI();
            requestAnimationFrame(gameLoop);
        }

        function updateUI() {
            const hPct = (state.hero.hp / state.hero.maxHp) * 100;
            document.getElementById('hero-hp-bar').style.width = hPct + '%';
            document.getElementById('hero-hp-text').innerText = `${Math.ceil(state.hero.hp)}/${state.hero.maxHp}`;
            
            // Hero Attack Cooldown UI
            const cdPct = (state.hero.attackCooldown / state.hero.maxAttackCooldown) * 100;
            document.getElementById('attack-cd-fill').style.height = cdPct + '%';

            if (state.enemies.length > 0) {
                const e = state.enemies[0];
                const ePct = (e.hp / e.maxHp) * 100;
                document.getElementById('enemy-hp-bar').style.width = ePct + '%';
                document.getElementById('enemy-hp-text').innerText = `${Math.ceil(e.hp)}/${e.maxHp}`;
            }
        }

        function handleRoundEnd(result) {
            state.gameActive = false;
            if (state.currentRound >= state.rounds) {
                const title = state.heroScore > state.enemyScore ? "NATURE'S CHAMPION" : "FOREST OVERRUN";
                handleGameOver(title, `Score: ${state.heroScore} - ${state.enemyScore}`);
            } else {
                state.currentRound++;
                document.getElementById('overlay-title').innerText = result;
                document.getElementById('overlay-msg').innerText = `Preparing for Round ${state.currentRound}...`;
                document.getElementById('overlay-screen').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('overlay-screen').classList.add('hidden');
                    resetRound();
                }, 2000);
            }
        }

        function resetRound() {
            state.hero.hp = state.maxHp;
            state.hero.x = 150;
            state.hero.y = state.groundY;
            state.enemies.forEach(e => e.remove());
            state.enemies = [];
            spawnEnemy();
            document.getElementById('current-round').innerText = state.currentRound;
            state.gameActive = true;
        }

        function handleGameOver(title, msg) {
            state.gameActive = false;
            document.getElementById('overlay-title').innerText = title;
            document.getElementById('overlay-msg').innerText = msg;
            document.getElementById('overlay-screen').classList.remove('hidden');
            document.getElementById('bg-music').pause();
        }

        window.addEventListener('keydown', e => state.keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => state.keys[e.key.toLowerCase()] = false);

    </script>
</body>
</html>
