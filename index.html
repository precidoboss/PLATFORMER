<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventurer's Quest</title>
    <style>
        @font-face {
            font-family: 'AntiquityPrint';
            src: url('https://raw.githubusercontent.com/precidoboss/adventurer/main/antiquity-print.ttf');
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background-color: #1a0a0a;
            font-family: 'AntiquityPrint', serif;
            user-select: none;
        }

        #game-container {
            position: fixed;
            inset: 0;
            overflow: hidden;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
        }

        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            color: #ffcccc;
            font-size: 24px;
            text-shadow: 2px 2px #000;
            pointer-events: none;
        }

        .loading-screen {
            position: absolute;
            inset: 0;
            background: #1a0a0a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #d4a373;
            z-index: 10;
        }
        
        #controls-hint {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 204, 204, 0.6);
            font-size: 14px;
        }
        #hp-wrap {
            position: absolute;
            bottom: 14px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }
        #hp-label { color: #ffcccc; font-size: 17px; text-shadow: 1px 1px #000; }
        #hp-bg { width: 160px; height: 14px; background: #333; border: 2px solid #666; border-radius: 3px; overflow: hidden; }
        #hp-fill { height: 100%; width: 100%; background: linear-gradient(90deg,#e74c3c,#c0392b); transition: width 0.15s; }
        #game-over {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.78);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffcccc;
            z-index: 20;
        }
        #game-over h1 { font-size: 56px; text-shadow: 0 0 18px #f00; margin-bottom: 16px; }
        #game-over p  { font-size: 22px; margin-bottom: 28px; }
        #game-over button {
            font-family: 'AntiquityPrint', serif;
            font-size: 20px; padding: 10px 30px;
            background: #3d1c1c; color: #ffcccc;
            border: 2px solid #884444; border-radius: 6px; cursor: pointer;
        }
        #game-over button:hover { background: #5a2020; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-overlay">
        <div>Distance: <span id="score">0</span>m</div>
        <div>Coins: <span id="coin-count">0</span></div>
    </div>
    <div id="controls-hint">AD / Arrows to Move | W / ↑ to Jump | Space or K to Attack</div>
    <div id="hp-wrap">
        <span id="hp-label">HP</span>
        <div id="hp-bg"><div id="hp-fill"></div></div>
    </div>
    <div id="game-over">
        <h1>YOU DIED</h1>
        <p id="go-score"></p>
        <button onclick="restartGame()">Try Again</button>
    </div>
    <div id="loading" class="loading-screen">
        <h2 style="font-family: 'AntiquityPrint'">Summoning Adventurer...</h2>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const coinEl = document.getElementById('coin-count');
    const loadingEl = document.getElementById('loading');
    const hpFill = document.getElementById('hp-fill');
    const gameOverEl = document.getElementById('game-over');
    const goScore = document.getElementById('go-score');

    const GAME_WIDTH = 960;
    const GAME_HEIGHT = 540;

    function resizeCanvas() {
        const scaleX = window.innerWidth / GAME_WIDTH;
        const scaleY = window.innerHeight / GAME_HEIGHT;
        const scale = Math.min(scaleX, scaleY);
        canvas.style.width  = (GAME_WIDTH  * scale) + 'px';
        canvas.style.height = (GAME_HEIGHT * scale) + 'px';
        canvas.style.position = 'absolute';
        canvas.style.left = ((window.innerWidth  - GAME_WIDTH  * scale) / 2) + 'px';
        canvas.style.top  = ((window.innerHeight - GAME_HEIGHT * scale) / 2) + 'px';
    }
    canvas.width  = GAME_WIDTH;
    canvas.height = GAME_HEIGHT;
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const ASSETS = {
        background: 'https://raw.githubusercontent.com/precidoboss/adventurer/main/adventurer%20background.png',
        platforms: 'https://raw.githubusercontent.com/precidoboss/adventurer/main/Platforms%20rocks.png',
        items: 'https://raw.githubusercontent.com/precidoboss/adventurer/main/coins-chests-etc-2-0.png',
        idle_right: 'https://raw.githubusercontent.com/precidoboss/adventurer/main/idle_right.png',
        idle_left: 'https://raw.githubusercontent.com/precidoboss/adventurer/main/idle_left.png',
        run_right: 'https://raw.githubusercontent.com/precidoboss/adventurer/main/run_right.png',
        run_left: 'https://raw.githubusercontent.com/precidoboss/adventurer/main/run_left.png',
        attack_right: 'https://raw.githubusercontent.com/precidoboss/adventurer/main/attack1_right.png',
        attack_left: 'https://raw.githubusercontent.com/precidoboss/adventurer/main/attack1_left.png',
        enemy_idle:   'https://raw.githubusercontent.com/precidoboss/adventurer/main/IDLE.png',
        enemy_run:    'https://raw.githubusercontent.com/precidoboss/adventurer/main/RUN.png',
        enemy_attack: 'https://raw.githubusercontent.com/precidoboss/adventurer/main/ATTACK%201.png',
        enemy_hurt:   'https://raw.githubusercontent.com/precidoboss/adventurer/main/HURT.png',
        trap_fire:    'https://raw.githubusercontent.com/precidoboss/adventurer/main/Fire.png',
        trap_arrow:   'https://raw.githubusercontent.com/precidoboss/adventurer/main/Shooter_Arrow_Trap.png',
        trap_spike:   'https://raw.githubusercontent.com/precidoboss/adventurer/main/Trap_Spike.png'
    };

    // Sounds (loaded separately, not counted in asset load)
    const SFX = {};
    function loadSound(key, url) {
        const a = new Audio(url);
        a.preload = 'auto';
        SFX[key] = a;
    }
    loadSound('sword',  'https://raw.githubusercontent.com/precidoboss/adventurer/main/17_orc_atk_sword_3.wav');
    loadSound('land',   'https://raw.githubusercontent.com/precidoboss/adventurer/main/13_human_jump_land_1.wav');
    loadSound('chest',  'https://raw.githubusercontent.com/precidoboss/adventurer/main/01_chest_open_3.wav');

    let bgMusic = null;
    function startMusic() {
        if (bgMusic) return;
        bgMusic = new Audio('https://raw.githubusercontent.com/precidoboss/adventurer/main/Goblins_Dance_(Battle).wav');
        bgMusic.loop = true;
        bgMusic.volume = 0.45;
        bgMusic.play().catch(() => {});
    }
    function playSound(key) {
        if (!SFX[key]) return;
        const clone = SFX[key].cloneNode();
        clone.volume = 0.7;
        clone.play().catch(() => {});
    }

    const images = {};
    let assetsLoaded = 0;
    const totalAssets = Object.keys(ASSETS).length;

    function loadAssets(callback) {
        for (let key in ASSETS) {
            images[key] = new Image();
            images[key].crossOrigin = "anonymous";
            images[key].src = ASSETS[key];
            images[key].onload = () => {
                assetsLoaded++;
                if (assetsLoaded === totalAssets) {
                    loadingEl.style.display = 'none';
                    callback();
                }
            };
        }
    }

    // Animation Config
    const FRAME_COUNTS = { idle: 8, run: 8, attack: 8 };
    const player = {
        x: 100, y: 300,
        width: 50, height: 70,
        drawWidth: 170, drawHeight: 160,
        vy: 0, vx: 0,
        speed: 6, jumpForce: -14, gravity: 0.7,
        grounded: false, wasGrounded: false,
        facing: 'right',
        state: 'idle',
        frame: 0,
        frameTimer: 0,
        isAttacking: false,
        coins: 0,
        hp: 100, maxHp: 100,
        invincible: 0,
        dead: false
    };

    const anims = {
        idle:   { frames: 8,  speed: 10 },
        run:    { frames: 8,  speed: 7  },
        attack: { frames: 9,  speed: 5  }
    };

    // Enemy anim data — sprite is 96px tall, facing always right (we flip via canvas transform)
    // IDLE: 960w/96h = 10 frames; RUN: 1536/96 = 16; ATTACK_1: 672/96 = 7; HURT: 384/96 = 4
    const enemyAnims = {
        idle:   { frames: 10, speed: 10 },
        run:    { frames: 16, speed: 5  },
        attack: { frames: 7,  speed: 6  },
        hurt:   { frames: 4,  speed: 7  }
    };

    let enemies = [];
    let traps   = [];
    let dmgNumbers = []; // { x, y, val, life, color }
    let particles  = []; // death burst
    let shakeTimer = 0, shakeMag = 0;

    const keys = {};
    let scrollX = 0;
    let score = 0;
    let platforms = [];
    let collectables = [];

    const platformSlices = [
        { sx: 30, sy: 20, sw: 180, sh: 180 },
        { sx: 250, sy: 20, sw: 350, sh: 180 },
        { sx: 600, sy: 50, sw: 300, sh: 300 }
    ];

    // Item Slices (x, y, w, h) from coins-chests-etc-2-0.png
    const ITEM_TYPES = {
        COIN: { sx: 16, sy: 16, sw: 16, sh: 16, val: 1 },
        CHEST: { sx: 16, sy: 560, sw: 32, sh: 32, val: 10 }
    };

    window.addEventListener('keydown', e => {
        startMusic();
        keys[e.code] = true;
        if ((e.code === 'KeyK' || e.code === 'Space') && !player.isAttacking) { e.preventDefault(); startAttack(); }
    });
    window.addEventListener('keyup', e => keys[e.code] = false);
    window.addEventListener('mousedown', () => { startMusic(); if(!player.isAttacking) startAttack(); });

    function startAttack() {
        player.isAttacking = true;
        player.frame = 0;
        player.state = 'attack';
        playSound('sword');
    }

    function restartGame() {
        gameOverEl.style.display = 'none';
        resetGame();
    }

    function resetGame() {
        player.y = 100; player.x = 100; player.vy = 0; player.coins = 0;
        player.hp = player.maxHp; player.dead = false; player.invincible = 0;
        score = 0; scrollX = 0;
        coinEl.innerText = '0';
        hpFill.style.width = '100%';
        enemies = []; traps = []; dmgNumbers = []; particles = []; shakeTimer = 0;
        // Ground platform — long starter
        platforms = [{ x: -100, y: 440, w: 1400, h: 100, type: 1 }];
        collectables = [];
        spawnItemsOnPlatform(platforms[0]);
    }

    function getNextPlatformY(lastY) {
        const delta = (Math.random() - 0.5) * 90; // ±45px max — always jumpable
        return Math.max(280, Math.min(420, lastY + delta));
    }

    function spawnItemsOnPlatform(p) {
        if (p.w < 100) return;
        // Spawn coins
        let coinCount = Math.floor(Math.random() * 4);
        for(let i=0; i<coinCount; i++) {
            collectables.push({
                x: p.x + 50 + (i * 40),
                y: p.y - 40,
                w: 20, h: 20,
                type: 'COIN',
                collected: false
            });
        }
        // Rare chest
        if (Math.random() > 0.8) {
            collectables.push({
                x: p.x + p.w/2,
                y: p.y - 40,
                w: 40, h: 40,
                type: 'CHEST',
                collected: false
            });
        }
        // Spawn enemy (skip very first platform)
        if (p.x > 500 && Math.random() > 0.45) {
            enemies.push({
                x: p.x + p.w * 0.6,
                y: p.y - 70,
                width: 50, height: 70,
                drawWidth: 160, drawHeight: 160,
                hp: 80, maxHp: 80,
                vx: 0, vy: 0,
                grounded: true,
                facing: 'left',
                state: 'idle',
                frame: 0, frameTimer: 0,
                isAttacking: false,
                attackCooldown: 0,
                hurtTimer: 0,
                platformRef: p
            });
        }
        // Traps — only on wide combat platforms, structured positions
        if (p.x > 300 && p.w >= 380) {
            const ttype = Math.random() > 0.5 ? 'spike' : 'fire';
            // Spike/fire: 20% from entry edge (hazard to dodge on approach)
            traps.push({
                x: p.x + p.w * 0.20,
                y: p.y - (ttype === 'spike' ? 32 : 28),
                w: ttype === 'spike' ? 48 : 40,
                h: ttype === 'spike' ? 32 : 28,
                type: ttype, frame: 0, frameTimer: 0
            });
            // Second trap at 65% — creates a zone to navigate through
            if (p.w > 450 && Math.random() > 0.5) {
                const ttype2 = Math.random() > 0.5 ? 'spike' : 'fire';
                traps.push({
                    x: p.x + p.w * 0.65,
                    y: p.y - (ttype2 === 'spike' ? 32 : 28),
                    w: ttype2 === 'spike' ? 48 : 40,
                    h: ttype2 === 'spike' ? 32 : 28,
                    type: ttype2, frame: 0, frameTimer: 0
                });
            }
        }
        // Arrow trap at far right end of wide platforms — shoots left as player approaches
        if (p.x > 400 && p.w >= 420 && Math.random() > 0.6) {
            traps.push({
                x: p.x + p.w - 44,
                y: p.y - 32,
                w: 32, h: 32,
                type: 'arrow', frame: 0, frameTimer: 0,
                shootTimer: 45, arrows: [] // offset timer so first shot comes quickly
            });
        }
    }

    function update() {
        if (player.dead) return;

        // ---- PLAYER ANIMATION ----
        if (!player.isAttacking) {
            if (Math.abs(player.vx) > 0.5) player.state = 'run';
            else player.state = 'idle';
        }
        player.frameTimer++;
        const currentAnim = anims[player.state];
        if (player.frameTimer >= currentAnim.speed) {
            player.frame++;
            player.frameTimer = 0;
            if (player.frame >= currentAnim.frames) {
                if (player.isAttacking) { player.isAttacking = false; player.state = 'idle'; }
                player.frame = 0;
            }
        }

        // ---- PLAYER MOVEMENT ----
        if (!player.isAttacking) {
            if (keys['ArrowRight'] || keys['KeyD']) { player.vx = player.speed; player.facing = 'right'; }
            else if (keys['ArrowLeft'] || keys['KeyA']) { player.vx = -player.speed; player.facing = 'left'; }
            else { player.vx *= 0.8; }
        } else { player.vx *= 0.9; }

        player.wasGrounded = player.grounded;
        if ((keys['ArrowUp'] || keys['KeyW']) && player.grounded) {
            player.vy = player.jumpForce;
            player.grounded = false;
        }
        player.vy += player.gravity;
        player.x += player.vx;
        player.y += player.vy;

        // ---- CAMERA ----
        if (player.x > GAME_WIDTH / 2) {
            let diff = player.x - GAME_WIDTH / 2;
            scrollX += diff;
            player.x = GAME_WIDTH / 2;
            platforms.forEach(p => p.x -= diff);
            collectables.forEach(c => c.x -= diff);
            enemies.forEach(e => e.x -= diff);
            traps.forEach(t => {
                t.x -= diff;
                if (t.arrows) t.arrows.forEach(a => a.x -= diff);
            });
            dmgNumbers.forEach(d => d.x -= diff);
            score = Math.floor(scrollX / 8);
            scoreEl.innerText = score;
        }

        // ---- PLAYER PLATFORM COLLISION ----
        player.grounded = false;
        for (let p of platforms) {
            if (player.x < p.x + p.w && player.x + player.width > p.x &&
                player.y + player.height > p.y && player.y + player.height < p.y + p.h + 20 &&
                player.vy >= 0) {
                player.y = p.y - player.height;
                player.vy = 0;
                player.grounded = true;
            }
        }
        if (!player.wasGrounded && player.grounded) playSound('land');

        // ---- ITEM COLLECTION ----
        collectables.forEach(c => {
            if (!c.collected && player.x < c.x + c.w && player.x + player.width > c.x &&
                player.y < c.y + c.h && player.y + player.height > c.y) {
                c.collected = true;
                player.coins += ITEM_TYPES[c.type].val;
                coinEl.innerText = player.coins;
                if (c.type === 'CHEST') playSound('chest');
            }
        });

        // ---- ENEMIES ----
        if (player.invincible > 0) player.invincible--;
        if (shakeTimer > 0) shakeTimer--;

        for (let e of enemies) {
            // Skip if dying — just animate
            if (e.dying) {
                e.frameTimer++;
                if (e.frameTimer >= 7) { e.frame++; e.frameTimer = 0; }
                e.y -= 0.8; // float up slightly as dying
                e.alpha = Math.max(0, (e.alpha || 1) - 0.04);
                continue;
            }

            // Gravity
            e.vy = (e.vy || 0) + player.gravity;
            e.y += e.vy;

            // Enemy platform collision
            e.grounded = false;
            for (let p of platforms) {
                if (e.x < p.x + p.w && e.x + e.width > p.x &&
                    e.y + e.height > p.y && e.y + e.height < p.y + p.h + 20 &&
                    e.vy >= 0) {
                    e.y = p.y - e.height;
                    e.vy = 0;
                    e.grounded = true;
                    e.currentPlatform = p;
                }
            }

            if (e.hurtTimer > 0) { e.hurtTimer--; e.state = 'hurt'; }
            else if (!e.isAttacking) {
                const dx = player.x - e.x;
                const dist = Math.abs(dx);
                const samePlatform = e.currentPlatform &&
                    player.x > e.currentPlatform.x && player.x < e.currentPlatform.x + e.currentPlatform.w;

                if (dist < 350) {
                    e.facing = dx < 0 ? 'left' : 'right';

                    // Smarter: strafe/circle at medium range, attack at close range
                    if (dist > 110) {
                        // Chase — but stop at platform edge
                        const nextX = e.x + (dx > 0 ? 1 : -1) * 2.5;
                        let onEdge = false;
                        if (e.currentPlatform) {
                            onEdge = nextX < e.currentPlatform.x + 10 || nextX + e.width > e.currentPlatform.x + e.currentPlatform.w - 10;
                        }
                        if (!onEdge) {
                            e.state = 'run';
                            e.vx = (dx > 0 ? 1 : -1) * 2.5;
                        } else {
                            e.state = 'idle';
                            e.vx = 0;
                        }
                    } else if (dist > 65) {
                        // Circle/strafe — stop and wait for opening
                        e.vx *= 0.7;
                        e.state = e.attackCooldown > 20 ? 'idle' : 'run';
                        // Occasionally step back to create space
                        if (e.attackCooldown > 40 && Math.random() < 0.02) {
                            e.vx = (dx > 0 ? -1 : 1) * 1.5; // step away
                        }
                    } else {
                        // In range — attack
                        e.vx = 0;
                        e.state = 'idle';
                        if (e.attackCooldown <= 0) {
                            e.isAttacking = true;
                            e.state = 'attack';
                            e.frame = 0;
                            e.frameTimer = 0;
                            e.attackCooldown = 90;
                            playSound('sword');
                        }
                    }
                } else {
                    e.state = 'idle';
                    e.vx *= 0.85;
                }
            }

            if (e.attackCooldown > 0) e.attackCooldown--;
            e.x += (e.vx || 0);

            // Enemy animation
            e.frameTimer++;
            const ea = enemyAnims[e.state] || enemyAnims.idle;
            if (e.frameTimer >= ea.speed) {
                e.frame++;
                e.frameTimer = 0;
                if (e.frame >= ea.frames) {
                    if (e.isAttacking) {
                        const ddx = Math.abs(player.x - e.x);
                        const ddy = Math.abs((player.y + player.height) - (e.y + e.height));
                        if (ddx < 120 && ddy < 50 && player.invincible === 0) {
                            hurtPlayer(12);
                        }
                        e.isAttacking = false;
                        e.state = 'idle';
                    }
                    e.frame = 0;
                }
            }

            // Player attack hits enemy
            if (player.isAttacking) {
                const dx = e.x - player.x;
                const dy = Math.abs((player.y + player.height) - (e.y + e.height));
                const inFront = player.facing === 'right' ? (dx > -20 && dx < 150) : (dx < 20 && dx > -150);
                if (inFront && dy < 60) {
                    e.hp -= 20;
                    e.hurtTimer = 18;
                    e.state = 'hurt';
                    e.frame = 0;
                    e.frameTimer = 0;
                    dmgNumbers.push({ x: e.x + 20, y: e.y - 10, val: 20, life: 50, color: '#ffe066' });
                    // Trigger dying
                    if (e.hp <= 0 && !e.dying) {
                        e.dying = true;
                        e.alpha = 1;
                        e.frame = 0;
                        e.frameTimer = 0;
                        // Burst particles
                        for (let i = 0; i < 12; i++) {
                            const angle = (Math.PI * 2 / 12) * i;
                            particles.push({
                                x: e.x + e.width / 2, y: e.y + e.height / 2,
                                vx: Math.cos(angle) * (2 + Math.random() * 3),
                                vy: Math.sin(angle) * (2 + Math.random() * 3) - 2,
                                life: 35, color: `hsl(${Math.random()*40},100%,60%)`
                            });
                        }
                        shakeTimer = 14; shakeMag = 6;
                    }
                }
            }
        }

        // Remove fully faded dying enemies
        enemies = enemies.filter(e => !(e.dying && (e.alpha || 1) <= 0));

        // Update particles
        particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life--; });
        particles = particles.filter(p => p.life > 0);

        // ---- TRAPS ----
        for (let t of traps) {
            // Animate
            t.frameTimer = (t.frameTimer || 0) + 1;
            const trapSpeeds = { fire: 8, spike: 12, arrow: 15 };
            const trapFrames = { fire: 4, spike: 5, arrow: 6 };
            if (t.frameTimer >= trapSpeeds[t.type]) {
                t.frame = (t.frame + 1) % trapFrames[t.type];
                t.frameTimer = 0;
            }

            // Arrow trap shoots
            if (t.type === 'arrow') {
                t.shootTimer = (t.shootTimer || 0) + 1;
                if (t.shootTimer > 90) {
                    t.shootTimer = 0;
                    t.arrows = t.arrows || [];
                    t.arrows.push({ x: t.x + 32, y: t.y + 14, vx: -5, w: 12, h: 6 });
                }
                t.arrows = (t.arrows || []).filter(a => a.x > -50);
                (t.arrows || []).forEach(a => {
                    a.x += a.vx;
                    if (!player.dead && player.invincible === 0 &&
                        player.x < a.x + a.w && player.x + player.width > a.x &&
                        player.y < a.y + a.h && player.y + player.height > a.y) {
                        hurtPlayer(10);
                        a.x = -999;
                    }
                });
            }

            // Spike / fire contact damage
            if ((t.type === 'spike' || t.type === 'fire') && player.invincible === 0) {
                if (player.x < t.x + t.w && player.x + player.width > t.x &&
                    player.y < t.y + t.h && player.y + player.height > t.y) {
                    hurtPlayer(8);
                }
            }
        }

        // ---- PROCEDURAL GEN ----
        const lastPlatform = platforms[platforms.length - 1];
        if (lastPlatform.x + lastPlatform.w < GAME_WIDTH + 400) {
            const gap = 100 + Math.random() * 60; // 100–160px — always jumpable
            const willHaveCombat = Math.random() > 0.4;
            const newW = willHaveCombat ? 420 + Math.random() * 160 : 200 + Math.random() * 100;
            const newY = getNextPlatformY(lastPlatform.y);
            let newP = {
                x: lastPlatform.x + lastPlatform.w + gap,
                y: newY,
                w: newW,
                h: 60,
                type: Math.floor(Math.random() * platformSlices.length)
            };
            platforms.push(newP);
            spawnItemsOnPlatform(newP);
        }

        if (platforms[0].x + platforms[0].w < -200) platforms.shift();
        collectables = collectables.filter(c => !c.collected && c.x > -100);
        traps = traps.filter(t => t.x > -200);
        enemies = enemies.filter(e => e.x > -200);

        // Tick damage numbers
        dmgNumbers.forEach(d => { d.y -= 1.2; d.life--; });
        dmgNumbers = dmgNumbers.filter(d => d.life > 0);

        if (player.y > GAME_HEIGHT) {
            hurtPlayer(player.hp); // kill on fall
        }
    }

    function hurtPlayer(dmg) {
        if (player.invincible > 0 || player.dead) return;
        player.hp = Math.max(0, player.hp - dmg);
        player.invincible = 60;
        hpFill.style.width = (player.hp / player.maxHp * 100) + '%';
        dmgNumbers.push({ x: player.x + 10, y: player.y - 10, val: dmg, life: 55, color: '#ff4444' });
        shakeTimer = 10; shakeMag = 5;
        if (player.hp <= 0) {
            player.dead = true;
            goScore.textContent = `Distance: ${score}m  |  Coins: ${player.coins}`;
            gameOverEl.style.display = 'flex';
        }
    }

    function drawSprite(img, totalFrames, frame, flipH, x, y, dw, dh) {
        if (!img || !img.complete || !img.naturalWidth) return;
        const frameW = img.naturalWidth / totalFrames;
        const frameH = img.naturalHeight;
        const safeFrame = Math.min(Math.floor(frame), totalFrames - 1);
        ctx.save();
        ctx.beginPath();
        ctx.rect(x + 0.5, y, dw - 1, dh);
        ctx.clip();
        if (flipH) {
            ctx.translate(x + dw, y);
            ctx.scale(-1, 1);
            ctx.drawImage(img, safeFrame * frameW, 0, frameW, frameH, 0, 0, dw, dh);
        } else {
            ctx.drawImage(img, safeFrame * frameW, 0, frameW, frameH, x, y, dw, dh);
        }
        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

        // Screen shake
        ctx.save();
        if (shakeTimer > 0) {
            const sx = (Math.random() - 0.5) * shakeMag * 2;
            const sy = (Math.random() - 0.5) * shakeMag * 2;
            ctx.translate(sx, sy);
        }

        // Background
        let bgScroll = (scrollX * 0.3) % GAME_WIDTH;
        ctx.drawImage(images.background, -bgScroll, 0, GAME_WIDTH, GAME_HEIGHT);
        ctx.drawImage(images.background, GAME_WIDTH - bgScroll, 0, GAME_WIDTH, GAME_HEIGHT);

        // Platforms
        platforms.forEach(p => {
            const slice = platformSlices[p.type];
            ctx.drawImage(images.platforms, slice.sx, slice.sy, slice.sw, slice.sh, p.x, p.y, p.w, p.h);
        });

        // Traps
        traps.forEach(t => {
            const trapKeys = { fire: 'trap_fire', spike: 'trap_spike', arrow: 'trap_arrow' };
            const trapFrames = { fire: 4, spike: 5, arrow: 6 };
            const img = images[trapKeys[t.type]];
            if (!img) return;
            const fw = img.naturalWidth / trapFrames[t.type];
            const fh = img.naturalHeight;
            ctx.drawImage(img, t.frame * fw, 0, fw, fh, t.x, t.y, t.w, t.h);
            if (t.type === 'arrow' && t.arrows) {
                ctx.fillStyle = '#c8a04a';
                t.arrows.forEach(a => ctx.fillRect(a.x, a.y, a.w, a.h));
            }
        });

        // Items
        collectables.forEach(c => {
            const it = ITEM_TYPES[c.type];
            ctx.drawImage(images.items, it.sx, it.sy, it.sw, it.sh, c.x, c.y, c.w, c.h);
        });

        // Death particles
        particles.forEach(p => {
            ctx.save();
            ctx.globalAlpha = Math.max(0, p.life / 35);
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        });

        // Enemies
        enemies.forEach(e => {
            const stateMap = { idle: 'enemy_idle', run: 'enemy_run', attack: 'enemy_attack', hurt: 'enemy_hurt' };
            const framesMap = { idle: 10, run: 16, attack: 7, hurt: 4 };
            const imgKey = stateMap[e.dying ? 'hurt' : e.state] || 'enemy_idle';
            const totalF  = framesMap[e.dying ? 'hurt' : e.state] || 10;
            const destX = e.x - (e.drawWidth - e.width) / 2;
            const destY = e.y + e.height - e.drawHeight;
            ctx.save();
            ctx.globalAlpha = e.dying ? (e.alpha || 1) : 1;
            // Red tint flash on hurt
            if (e.hurtTimer > 0 && !e.dying) {
                ctx.filter = 'brightness(2) saturate(0) sepia(1) hue-rotate(-30deg)';
            }
            drawSprite(images[imgKey], totalF, e.frame, e.facing === 'left', destX, destY, e.drawWidth, e.drawHeight);
            ctx.filter = 'none';
            ctx.restore();
            // Enemy HP bar (hide when dying)
            if (!e.dying) {
                const barW = 55, barH = 5;
                const barX = e.x - (barW - e.width) / 2;
                const barY = destY - 10;
                ctx.fillStyle = '#333';
                ctx.fillRect(barX, barY, barW, barH);
                ctx.fillStyle = e.hp / e.maxHp > 0.5 ? '#2ecc71' : '#e74c3c';
                ctx.fillRect(barX, barY, barW * (e.hp / e.maxHp), barH);
            }
        });

        // Player — ground anchored
        const flash = player.invincible > 0 && Math.floor(player.invincible / 5) % 2 === 0;
        if (!flash) {
            const spriteKey = `${player.state}_${player.facing}`;
            const spriteImg = images[spriteKey];
            const totalFrames = anims[player.state].frames;
            const destX = player.x - (player.drawWidth - player.width) / 2;
            const destY = player.y + player.height - player.drawHeight;
            drawSprite(spriteImg, totalFrames, player.frame, false, destX, destY, player.drawWidth, player.drawHeight);
        }

        // Damage numbers
        dmgNumbers.forEach(d => {
            const alpha = Math.min(1, d.life / 20);
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.font = 'bold 22px Arial';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 4;
            ctx.strokeText('-' + d.val, d.x, d.y);
            ctx.fillStyle = d.color;
            ctx.fillText('-' + d.val, d.x, d.y);
            ctx.restore();
        });

        ctx.restore(); // end shake transform

        requestAnimationFrame(() => {
            update();
            draw();
        });
    }

    loadAssets(() => {
        resetGame();
        draw();
    });
</script>
</body>
</html>
