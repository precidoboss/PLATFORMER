<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knight Quest: Mushroom Menace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0d1117; font-family: 'Inter', sans-serif; }
        canvas { display: block; image-rendering: pixelated; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; pointer-events: none;
        }
        .ui-panel {
            background: rgba(13, 17, 23, 0.95);
            border: 2px solid #30363d;
            padding: 2.5rem;
            border-radius: 1.5rem;
            text-align: center;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            pointer-events: auto;
            max-width: 650px;
        }
        #hud {
            position: absolute; top: 20px; left: 20px; color: white;
            pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); z-index: 10;
            display: none;
        }
        .hp-bar { width: 300px; height: 24px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 6px; overflow: hidden; position: relative; }
        #hero-hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff4757, #ff6b81); transition: width 0.2s; }
        
        #boss-hud {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: none; text-align: center; width: 85%; max-width: 900px;
        }
        .boss-bar { height: 16px; background: #000; border: 2px solid #ff4757; width: 100%; margin-top: 8px; border-radius: 4px; }
        #boss-hp-fill { width: 100%; height: 100%; background: #ff4757; transition: width 0.1s; box-shadow: 0 0 15px #ff4757; }

        .btn-primary {
            background: #fff; color: #000; padding: 1.2rem 3.5rem; font-weight: 900;
            border-radius: 9999px; transition: all 0.2s; text-transform: uppercase;
            letter-spacing: 0.15em; cursor: pointer; border: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .btn-primary:hover { background: #60a5fa; color: #fff; transform: translateY(-3px) scale(1.05); }
        .hidden { display: none !important; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .pulse { animation: pulse 2s infinite; }
    </style>
</head>
<body>

    <div id="hud">
        <h1 class="text-4xl font-black italic text-blue-400 leading-none mb-2">KNIGHT QUEST</h1>
        <div class="hp-bar"><div id="hero-hp-fill"></div></div>
        <div class="flex justify-between items-center mt-2">
             <p id="score-val" class="text-xl font-bold text-yellow-500">Distance: 0m</p>
             <p id="kill-count" class="text-xl font-bold text-red-400">Slaughtered: 0</p>
        </div>
        <div class="text-xs text-gray-500 mt-1">[SPACE] Attack | [SHIFT] Roll | [WASD] Move</div>
    </div>

    <div id="boss-hud">
        <h2 class="text-white font-black italic tracking-widest text-2xl uppercase mb-1">The Slime Monarch</h2>
        <div class="boss-bar"><div id="boss-hp-fill"></div></div>
    </div>

    <div id="overlay">
        <div id="start-screen" class="ui-panel">
            <h1 class="text-7xl font-black italic text-blue-400 mb-2 tracking-tighter leading-tight">KNIGHT QUEST</h1>
            <p class="text-gray-400 mb-8 tracking-widest uppercase text-sm font-bold pulse">Mushroom Menace</p>
            <button onclick="startGame()" class="btn-primary">Start Conquest</button>
        </div>

        <div id="death-screen" class="ui-panel hidden">
            <h2 class="text-7xl font-black text-red-600 mb-4 italic">YOU DIED</h2>
            <p class="text-2xl mb-8 text-gray-400">Your journey ends in the fungal depths.</p>
            <button onclick="resetGame()" class="btn-primary">Resurrect</button>
        </div>

        <div id="win-screen" class="ui-panel hidden">
            <h2 class="text-7xl font-black text-yellow-400 mb-4 italic">GOD SLAYER</h2>
            <p class="text-2xl mb-8 text-gray-400">The forest is silent once more.</p>
            <button onclick="location.reload()" class="btn-primary">New Journey</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const BASE_URL = 'https://raw.githubusercontent.com/precidoboss/my-game-sprites/main/';
        
        const SPRITES = {
            idle: { src: '_Idle.png', frames: 10, w: 120, h: 80 },
            run: { src: '_Run.png', frames: 10, w: 120, h: 80 },
            jump: { src: '_Jump.png', frames: 3, w: 120, h: 80 },
            attack: { src: '_AttackCombo2hit.png', frames: 10, w: 120, h: 80 },
            roll: { src: '_Roll.png', frames: 12, w: 120, h: 80 },
            hurt: { src: '_Hit.png', frames: 1, w: 120, h: 80 },
            death: { src: '_Death.png', frames: 10, w: 120, h: 80 },
            
            // Mushroom Enemy (150x150 frames)
            m_run: { src: 'Mushroom-Run.png', frames: 8, w: 150, h: 150 },
            m_idle: { src: 'Mushroom-Idle.png', frames: 4, w: 150, h: 150 },
            m_hurt: { src: 'Mushroom-Hit.png', frames: 4, w: 150, h: 150 },
            m_die: { src: 'Mushroom-Die.png', frames: 6, w: 150, h: 150 },
            
            p1: { src: '_platformsteps1-removebg-preview.png' },
            p2: { src: '_platformsteps2-removebg-preview.png' },
            p3: { src: 'ChatGPT_Image_Apr_17__2026__07_09_09_AM-removebg-preview%20(1).png' },
            boss: { src: 'bee_attack.png', frames: 4, w: 64, h: 64 },
            bg: { src: 'background.png' }
        };

        const images = {};
        const state = {
            gameRunning: false,
            kills: 0,
            isDead: false,
            hasWon: false,
            shake: 0,
            lastSpawn: 0,
            spawnLimit: 2
        };

        const player = {
            x: 200, y: 0, vx: 0, vy: 0, w: 220, h: 140, hbW: 50, hbH: 80,
            dir: 1, hp: 100, maxHp: 100, state: 'idle', frame: 0, timer: 0,
            isJumping: false, isAttacking: false, isRolling: false, invul: 0,
            hurtTimer: 0, deadAnimComplete: false
        };

        const boss = {
            x: 15000, y: 0, w: 400, h: 400, hp: 2000, maxHp: 2000,
            active: false, dir: -1
        };

        let platforms = [];
        let enemies = [];
        const keys = {};

        // PRELOAD
        Object.keys(SPRITES).forEach(k => {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.src = BASE_URL + SPRITES[k].src;
            images[k] = img;
        });

        function spawnEnemy() {
            if (!state.gameRunning || state.isDead || enemies.length >= state.spawnLimit || player.x > 14000) return;
            
            // Find a platform significantly ahead of the player
            const targetPlatform = platforms.find(p => p.x > player.x + 600 && p.x < player.x + 2000);
            if (!targetPlatform) return;

            // Health increases with distance
            const difficultyScale = 1 + (player.x / 5000);
            
            enemies.push({
                x: targetPlatform.x + targetPlatform.w/2, 
                y: targetPlatform.y - 125, // Adjusted height offset for 150x150 sprite
                w: 160, h: 160, 
                hp: 200 * difficultyScale, 
                maxHp: 200 * difficultyScale,
                vx: (Math.random() > 0.5 ? 2.5 : -2.5), 
                state: 'm_run', frame: 0, timer: 0, 
                isDead: false, hurtTimer: 0, 
                platform: targetPlatform
            });
        }

        function buildLevel() {
            const groundY = canvas.height - 150;
            // Create a much longer world
            platforms = [
                { x: -500, y: groundY, w: 3000, h: 200, type: 'p1' },
                { x: 3000, y: groundY - 150, w: 1000, h: 60, type: 'p3' },
                { x: 4500, y: groundY - 300, w: 1000, h: 60, type: 'p3' },
                { x: 6000, y: groundY - 150, w: 1500, h: 100, type: 'p1' },
                { x: 8000, y: groundY - 350, w: 1200, h: 60, type: 'p2' },
                { x: 9500, y: groundY - 200, w: 1500, h: 60, type: 'p2' },
                { x: 11500, y: groundY - 400, w: 1000, h: 60, type: 'p3' },
                { x: 13000, y: groundY - 200, w: 1200, h: 100, type: 'p1' },
                // BOSS ARENA
                { x: 14500, y: groundY, w: 8000, h: 300, type: 'p1' }
            ];
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('hud').style.display = 'block';
            state.gameRunning = true;
            resetGame();
        }

        function resetGame() {
            player.x = 200; 
            player.y = canvas.height - 400; 
            player.hp = 100; player.vx = 0; player.vy = 0;
            player.state = 'idle'; player.deadAnimComplete = false;
            player.isAttacking = false; player.isRolling = false;
            state.isDead = false; state.hasWon = false; state.kills = 0;
            enemies = []; boss.hp = boss.maxHp; boss.active = false;
            document.getElementById('death-screen').classList.add('hidden');
            document.getElementById('win-screen').classList.add('hidden');
            document.getElementById('boss-hud').style.display = 'none';
            document.getElementById('hero-hp-fill').style.width = '100%';
        }

        function update(t) {
            if (!state.gameRunning) return;

            // Handle Death Sequence
            if (state.isDead) {
                if (!player.deadAnimComplete) {
                    player.state = 'death';
                    const conf = SPRITES.death;
                    if (t - player.timer > 120) {
                        player.frame++;
                        player.timer = t;
                        if (player.frame >= conf.frames) {
                            player.frame = conf.frames - 1;
                            player.deadAnimComplete = true;
                            // Show death screen AFTER animation
                            setTimeout(() => {
                                document.getElementById('death-screen').classList.remove('hidden');
                            }, 500);
                        }
                    }
                }
                return;
            }

            if (state.hasWon) return;

            // NEW CONTROLS: Space for Attack, Shift for Roll
            if (!player.isAttacking && !player.isRolling && player.hurtTimer <= 0) {
                if (keys['KeyA'] || keys['ArrowLeft']) { player.vx = -11; player.dir = -1; }
                else if (keys['KeyD'] || keys['ArrowRight']) { player.vx = 11; player.dir = 1; }
                else { player.vx *= 0.82; }
                
                if ((keys['KeyW'] || keys['ArrowUp'] || keys['KeyK']) && !player.isJumping) {
                    player.vy = -23; player.isJumping = true;
                }

                if (keys['ShiftLeft'] || keys['ShiftRight']) { 
                    player.isRolling = true; player.frame = 0; 
                    player.vx = player.dir * 20; player.timer = t;
                    player.state = 'roll';
                } else if (keys['Space']) { 
                    player.isAttacking = true; player.frame = 0; 
                    player.vx = 0; player.timer = t;
                    player.state = 'attack';
                }
            }

            if (player.isRolling) player.vx = player.dir * 20;

            player.vy += 1.0;
            player.x += player.vx;
            player.y += player.vy;
            if (player.hurtTimer > 0) player.hurtTimer--;

            // Platform Collision
            let onGround = false;
            platforms.forEach(p => {
                const px = player.x + (player.w - player.hbW)/2;
                const py = player.y + (player.h - player.hbH);
                if (px < p.x + p.w && px + player.hbW > p.x && py + player.hbH > p.y && py + player.hbH < p.y + p.h + player.vy) {
                    if (player.vy >= 0) { player.vy = 0; player.y = p.y - player.h; onGround = true; }
                }
            });
            player.isJumping = !onGround;
            
            // Death from Pit
            if (player.y > canvas.height + 200) { 
                player.hp = 0; 
                document.getElementById('hero-hp-fill').style.width = '0%';
                die(); 
            }

            // Boss Encounter
            if (player.x > 14600 && !boss.active) {
                boss.active = true;
                boss.y = canvas.height - 500; // Low enough to be hit by character
                document.getElementById('boss-hud').style.display = 'block';
            }
            if (boss.active) {
                boss.dir = player.x > boss.x + boss.w/2 ? 1 : -1;
                boss.x += boss.dir * 4;
                if (Math.abs(player.x - boss.x) < 180 && player.invul <= 0 && !player.isRolling) takeDamage(20);
                if (player.isAttacking && player.frame > 4 && player.frame < 9 && Math.abs(player.x - boss.x) < 300) {
                    boss.hp -= 5;
                    document.getElementById('boss-hp-fill').style.width = (boss.hp/boss.maxHp)*100 + '%';
                    if (boss.hp <= 0) win();
                }
            }

            // Mushroom AI and Logic
            if (t - state.lastSpawn > 3500) { spawnEnemy(); state.lastSpawn = t; }
            enemies.forEach((en, i) => {
                if (en.isDead) {
                    if (t - en.timer > 100) {
                        en.frame++;
                        en.timer = t;
                        if (en.frame >= SPRITES.m_die.frames) enemies.splice(i,1);
                    }
                    return;
                }

                // AI: Patrol platform borders
                en.x += en.vx;
                if (en.x < en.platform.x || en.x + en.w > en.platform.x + en.platform.w) {
                    en.vx *= -1;
                }

                // Animation
                const enConf = SPRITES[en.state];
                if (t - en.timer > 110) {
                    en.frame = (en.frame + 1) % enConf.frames;
                    en.timer = t;
                    if (en.state === 'm_hurt' && en.frame === 0) en.state = 'm_run';
                }

                // Damage Interaction
                const pCenterX = player.x + player.w/2;
                const enCenterX = en.x + en.w/2;
                const dist = Math.abs(pCenterX - enCenterX);

                // Take damage from mushrooms
                if (dist < 80 && player.invul <= 0 && !player.isRolling && Math.abs(player.y - en.y) < 100) takeDamage(15);
                
                // Hit mushrooms
                if (player.isAttacking && player.frame > 5 && player.frame < 9 && dist < 180) {
                    en.hp -= 25;
                    en.state = 'm_hurt';
                    en.frame = 0;
                    if (en.hp <= 0) {
                        en.isDead = true; en.state = 'm_die'; en.frame = 0;
                        state.kills++;
                        document.getElementById('kill-count').innerText = `Slaughtered: ${state.kills}`;
                    }
                }
            });

            // Player State Machine
            if (!state.isDead) {
                if (player.hurtTimer > 0) player.state = 'hurt';
                else if (player.isAttacking) player.state = 'attack';
                else if (player.isRolling) player.state = 'roll';
                else if (player.isJumping) player.state = 'jump';
                else if (Math.abs(player.vx) > 1) player.state = 'run';
                else player.state = 'idle';

                const pConf = SPRITES[player.state];
                if (t - player.timer > 85) {
                    player.frame++;
                    player.timer = t;
                    if (player.frame >= pConf.frames) {
                        player.frame = 0;
                        if (player.isAttacking) player.isAttacking = false;
                        if (player.isRolling) player.isRolling = false;
                    }
                }
            }

            if (player.invul > 0) player.invul--;
            if (state.shake > 0) state.shake *= 0.9;
            document.getElementById('score-val').innerText = `Distance: ${Math.floor(player.x/10)}m`;
        }

        function takeDamage(amt) {
            if (player.invul > 0 || player.isRolling || state.isDead) return;
            player.hp -= amt; player.invul = 50; player.hurtTimer = 12;
            state.shake = 18;
            document.getElementById('hero-hp-fill').style.width = Math.max(0, player.hp) + '%';
            if (player.hp <= 0) die();
        }

        function die() { 
            if (state.isDead) return;
            state.isDead = true; 
            player.frame = 0; 
            player.timer = performance.now();
            player.vx = 0; 
            player.isAttacking = false; 
            player.isRolling = false;
        }

        function win() { 
            state.hasWon = true; 
            document.getElementById('win-screen').classList.remove('hidden'); 
            document.getElementById('boss-hud').style.display = 'none'; 
        }

        function draw() {
            ctx.save();
            if (state.shake > 0.5) ctx.translate((Math.random()-0.5)*state.shake, (Math.random()-0.5)*state.shake);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const camX = state.gameRunning ? player.x - canvas.width/2 + 150 : 0;
            const bgW = canvas.width;
            if (images.bg.complete) {
                const scrollX = (camX * 0.15) % bgW;
                ctx.drawImage(images.bg, -scrollX - bgW, 0, bgW + 2, canvas.height);
                ctx.drawImage(images.bg, -scrollX, 0, bgW + 2, canvas.height);
                ctx.drawImage(images.bg, -scrollX + bgW, 0, bgW + 2, canvas.height);
            }

            ctx.translate(-camX, 0);

            // Platforms
            platforms.forEach(p => { 
                if (images[p.type]?.complete) ctx.drawImage(images[p.type], p.x, p.y, p.w, p.h); 
            });

            // Boss
            if (boss.active) {
                ctx.save();
                ctx.translate(boss.x, boss.y);
                if (boss.dir === 1) { ctx.scale(-1,1); ctx.translate(-boss.w, 0); }
                ctx.drawImage(images.boss, (Math.floor(Date.now()/150)%4)*64, 0, 64, 64, 0, 0, boss.w, boss.h);
                ctx.restore();
            }

            // Mushroom Enemies
            enemies.forEach(en => {
                ctx.save();
                ctx.translate(en.x, en.y);
                if (en.vx > 0) { ctx.scale(-1,1); ctx.translate(-en.w, 0); }
                const conf = SPRITES[en.state];
                if (images[en.state].complete) {
                    ctx.drawImage(images[en.state], en.frame * conf.w, 0, conf.w, conf.h, 0, 0, en.w, en.h);
                }
                ctx.restore();
            });

            // Player
            ctx.save();
            if (player.dir === -1) { ctx.translate(player.x + player.w, player.y); ctx.scale(-1, 1); }
            else ctx.translate(player.x, player.y);
            
            if (player.invul % 4 > 2) ctx.globalAlpha = 0.4;
            
            const pConf = SPRITES[player.state];
            if (images[player.state].complete) {
                ctx.drawImage(images[player.state], player.frame * pConf.w, 0, pConf.w, pConf.h, 0, 0, player.w, player.h);
            }
            ctx.restore();
            
            ctx.restore();
        }

        function gameLoop(t) { update(t); draw(); requestAnimationFrame(gameLoop); }

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            // Prevent scrolling with space/arrows
            if (["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) e.preventDefault();
        });
        window.addEventListener('keyup', e => keys[e.code] = false);
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; buildLevel(); });
        
        window.onload = () => { buildLevel(); init(); };
        function init() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; requestAnimationFrame(gameLoop); }
    </script>
</body>
</html>
