<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

<body>

<div id="ui">
  <span>HP: <span id="hpVal">100</span></span>

</div>

<canvas id="canvas" width="800" height="500"></canvas>

<div id="overlay" id="overlay">
  <h1>GROTTO</h1>
  <p>LEVEL 1 — THE SUNKEN CAVERN</p>
  <p style="margin-top:15px">ARROW KEYS / WASD — MOVE &amp; JUMP</p>
  <p>SPACE — ATTACK WITH CHAIN</p>
  <button onclick="startGame()">ENTER THE GROTTO</button>
</div>

<div id="controls">← → / A D : MOVE &nbsp;|&nbsp; W / ↑ / SPACE : JUMP &nbsp;|&nbsp; X / CTRL : ATTACK</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 800, H = 500;

// ─── SPRITE LOADING ───────────────────────────────────────────────────────────
const imgs = {};
const toLoad = {
  bg:    'https://github.com/precidoboss/PLATFORMER/blob/main/photo_1_2026-04-15_05-32-12.jpg',
  fx:    'https://github.com/precidoboss/PLATFORMER/blob/main/photo_2_2026-04-15_05-32-12.jpg',
  char:  'https://github.com/precidoboss/PLATFORMER/blob/main/photo_1_2026-04-15_05-30-12.jpg',
  enemy: 'https://github.com/precidoboss/PLATFORMER/blob/main/photo_2_2026-04-15_05-30-12.jpg',
  plat:  'https://github.com/precidoboss/PLATFORMER/blob/main/photo_3_2026-04-15_05-30-12.jpg',
};

// We'll extract sprites to offscreen canvases with magenta/green bg removed
let loaded = 0;
const totalImgs = Object.keys(toLoad).length;

function loadImages(cb) {
  for (const [k, src] of Object.entries(toLoad)) {
    const img = new Image();
    img.onload = () => {
      imgs[k] = img;
      loaded++;
      if (loaded === totalImgs) cb();
    };
    img.onerror = () => { loaded++; if (loaded === totalImgs) cb(); };
    img.src = src;
  }
}

// Extract a sprite frame from a spritesheet to an offscreen canvas with transparency
function extractFrame(srcImg, sx, sy, sw, sh, removeColor) {
  const oc = document.createElement('canvas');
  oc.width = sw; oc.height = sh;
  const octx = oc.getContext('2d');
  octx.drawImage(srcImg, sx, sy, sw, sh, 0, 0, sw, sh);
  const id = octx.getImageData(0, 0, sw, sh);
  const d = id.data;
  for (let i = 0; i < d.length; i += 4) {
    const r = d[i], g = d[i+1], b = d[i+2];
    // Remove dark green/teal background (the sprite sheet bg color)
    // The bg is roughly #2d4a3e to #3a5a4a range
    if (removeColor) {
      const isGreenBg = g > r && g > b && r < 90 && b < 100 && g < 130 && g > 40;
      const isDarkBg = r < 50 && g < 60 && b < 55 && r+g+b < 130;
      const isTileBg = r > 40 && r < 80 && g > 65 && g < 105 && b > 60 && b < 95 && Math.abs(r-b) < 25;
      if (isGreenBg || isDarkBg || isTileBg) d[i+3] = 0;
    }
  }
  octx.putImageData(id, 0, 0);
  return oc;
}

// ─── SPRITE DEFINITIONS ───────────────────────────────────────────────────────
// Based on visual analysis of the sprite sheets:

// CHARACTER sheet (photo_3_2026-04-15_05-30-12.jpg) — 1024x1024
// Top section: 3 large idle frames ~320px wide each
// Grid rows below: each row ~170px tall, frames ~170px wide
// The sheet is 1024px wide, each cell about 170px
const CHAR_CELL = 170;
const CHAR_SHEET_W = 1024;
const CHAR_SHEET_H = 1024;
// Row 0 (y=0): 3 large front views (340px each)
// Row 1 (y=340): Walk Left — 4 frames, Walk Right — 4 frames
// Row 2 (y=510): Jump L — 3 frames, Jump R — 3 frames
// Row 3 (y=680): Attack L — 3 frames, Attack R — 3 frames
// Row 4 (y=850): Hurt L — 3 frames, Hurt R — 3 frames

// ENEMY sheet (photo_1_2026-04-15_05-30-12.jpg) — 1024x1024
// Similar layout for the beetle enemy

// PLATFORM sheet (photo_2_2026-04-15_05-30-12.jpg) — 1024x1024

let sprites = {};

function buildSprites() {
  const cImg = imgs.char;
  const eImg = imgs.enemy;
  const pImg = imgs.plat;
  const fxImg = imgs.fx;

  // ── Character sprites ──────────────────────────────────────────────────────
  // The sprite sheet header takes ~330px, then rows of animations
  // Each animation cell is approximately 256px wide, 170px tall
  // Sheet is 1024x1024. Top 3 cells are big (full height ~330 each)
  // Let's define by careful measurement:

  const CS = 256; // char cell size
  const CTOP = 330; // top section height

  sprites.charIdle = [];
  // Top row: 3 large poses at roughly 330px wide
  for (let i = 0; i < 3; i++) {
    sprites.charIdle.push(extractFrame(cImg, i*330, 0, 330, 330, true));
  }

  // Walk left row (row A): y ≈ 330, 4 frames
  sprites.charWalkL = [];
  for (let i = 0; i < 4; i++) {
    sprites.charWalkL.push(extractFrame(cImg, i*CS, CTOP, CS, 170, true));
  }
  // Walk right (row E, right half): y ≈ 330, x from 512
  sprites.charWalkR = [];
  for (let i = 0; i < 4; i++) {
    sprites.charWalkR.push(extractFrame(cImg, 512 + i*CS, CTOP, CS, 170, true));
  }

  // Jump left (row B): y ≈ 500, 3 frames
  sprites.charJumpL = [];
  for (let i = 0; i < 3; i++) {
    sprites.charJumpL.push(extractFrame(cImg, i*CS, CTOP+170, CS, 170, true));
  }
  sprites.charJumpR = [];
  for (let i = 0; i < 3; i++) {
    sprites.charJumpR.push(extractFrame(cImg, 512+i*CS, CTOP+170, CS, 170, true));
  }

  // Attack left (row C): y ≈ 670, 3 frames
  sprites.charAttackL = [];
  for (let i = 0; i < 3; i++) {
    sprites.charAttackL.push(extractFrame(cImg, i*CS, CTOP+340, CS, 170, true));
  }
  sprites.charAttackR = [];
  for (let i = 0; i < 3; i++) {
    sprites.charAttackR.push(extractFrame(cImg, 512+i*CS, CTOP+340, CS, 170, true));
  }

  // Hurt left (row D): y ≈ 840
  sprites.charHurtL = [];
  for (let i = 0; i < 3; i++) {
    sprites.charHurtL.push(extractFrame(cImg, i*CS, CTOP+510, CS, 170, true));
  }
  sprites.charHurtR = [];
  for (let i = 0; i < 3; i++) {
    sprites.charHurtR.push(extractFrame(cImg, 512+i*CS, CTOP+510, CS, 170, true));
  }

  // ── Enemy sprites ──────────────────────────────────────────────────────────
  const ETOP = 330;
  sprites.enemyIdle = [];
  for (let i = 0; i < 3; i++) {
    sprites.enemyIdle.push(extractFrame(eImg, i*330, 0, 330, 330, true));
  }
  sprites.enemyWalkL = [];
  for (let i = 0; i < 3; i++) {
    sprites.enemyWalkL.push(extractFrame(eImg, i*CS, ETOP, CS, 170, true));
  }
  sprites.enemyWalkR = [];
  for (let i = 0; i < 3; i++) {
    sprites.enemyWalkR.push(extractFrame(eImg, 512+i*CS, ETOP, CS, 170, true));
  }
  sprites.enemyAttackL = [];
  for (let i = 0; i < 3; i++) {
    sprites.enemyAttackL.push(extractFrame(eImg, i*CS, ETOP+340, CS, 170, true));
  }
  sprites.enemyHurtL = [];
  for (let i = 0; i < 3; i++) {
    sprites.enemyHurtL.push(extractFrame(eImg, i*CS, ETOP+510, CS, 170, true));
  }

  // ── Platform sprites ──────────────────────────────────────────────────────
  // Platform sheet: top 3 = state views (~330px wide), then animation rows
  sprites.platNormal = extractFrame(pImg, 0, 0, 330, 330, true);
  sprites.platCompressed = extractFrame(pImg, 330, 0, 330, 330, true);
  sprites.platRecoil = extractFrame(pImg, 660, 0, 330, 330, true);

  // Impact row (A): y≈330, 3 frames each side
  sprites.platImpact = [];
  for (let i = 0; i < 3; i++) {
    sprites.platImpact.push(extractFrame(pImg, i*CS, 330, CS, 170, true));
  }

  // Bounce loop (row C): y≈670
  sprites.platBounce = [];
  for (let i = 0; i < 3; i++) {
    sprites.platBounce.push(extractFrame(pImg, i*CS, 670, CS, 170, true));
  }

  // ── FX sprites ────────────────────────────────────────────────────────────
  // FX sheet: rows labeled clearly
  // Water drop: row 0, y≈0, 9 frames
  sprites.waterDrop = [];
  const FX_W = 1024;
  const FX_CELL = 113; // 1024/9 ≈ 113
  for (let i = 0; i < 9; i++) {
    sprites.waterDrop.push(extractFrame(fxImg, i*FX_CELL, 0, FX_CELL, 110, true));
  }

  // Rising bubbles: row 1 (y≈110), 5 frames
  sprites.bubbles = [];
  for (let i = 0; i < 5; i++) {
    sprites.bubbles.push(extractFrame(fxImg, i*FX_CELL, 110, FX_CELL, 110, true));
  }

  // Mushroom pulse: row 2 (y≈220), 4 frames
  sprites.mushPulse = [];
  for (let i = 0; i < 4; i++) {
    sprites.mushPulse.push(extractFrame(fxImg, i*FX_CELL, 220, FX_CELL, 130, true));
  }

  // Wisps: row 2 right side (y≈220, x from 512), 5 frames
  sprites.wisps = [];
  for (let i = 0; i < 5; i++) {
    sprites.wisps.push(extractFrame(fxImg, 512+i*FX_CELL, 220, FX_CELL, 130, true));
  }

  // Large splash: row 3 (y≈350), 8 frames
  sprites.splash = [];
  for (let i = 0; i < 8; i++) {
    sprites.splash.push(extractFrame(fxImg, i*FX_CELL, 370, FX_CELL, 110, true));
  }

  // Kelp: row 4 (y≈480), 4 frames
  sprites.kelp = [];
  for (let i = 0; i < 4; i++) {
    sprites.kelp.push(extractFrame(fxImg, i*FX_CELL, 490, FX_CELL, 110, true));
  }
}

// ─── GAME STATE ───────────────────────────────────────────────────────────────
let gameRunning = false;
let keys = {};
let score = 0;
let gameOver = false;
let gameWon = false;

const GRAVITY = 0.5;
const GROUND = H - 60;

// Player
const player = {
  x: 100, y: 300, w: 60, h: 80,
  vx: 0, vy: 0,
  onGround: false,
  facing: 1, // 1=right, -1=left
  state: 'idle', // idle, walk, jump, attack, hurt
  frame: 0, frameTick: 0, frameRate: 8,
  hp: 100, maxHp: 100,
  attackCooldown: 0,
  hurtTimer: 0,
  invincible: 0,
  attackBox: null,
};

// Platforms
let platforms = [];

// Enemies
let enemies = [];

// Ambient FX
let ambientFx = [];

// Attack particles
let particles = [];

// Tick counter
let tick = 0;

function initLevel() {
  score = 0;
  gameOver = false;
  gameWon = false;
  player.x = 80; player.y = 300;
  player.vx = 0; player.vy = 0;
  player.hp = 100;
  player.state = 'idle'; player.frame = 0;
  player.attackCooldown = 0;
  player.hurtTimer = 0;
  player.invincible = 0;
  player.facing = 1;

  // Platforms — organic grotto layout
  platforms = [
    { x: 0,   y: 440, w: 250, h: 60, type: 'ground' },
    { x: 280, y: 440, w: 250, h: 60, type: 'ground' },
    { x: 560, y: 440, w: 240, h: 60, type: 'ground' },
    // Elevated platforms
    { x: 100, y: 330, w: 120, h: 40, type: 'bounce' },
    { x: 320, y: 270, w: 130, h: 40, type: 'bounce' },
    { x: 550, y: 320, w: 130, h: 40, type: 'bounce' },
    { x: 220, y: 190, w: 120, h: 40, type: 'bounce' },
    { x: 480, y: 180, w: 150, h: 40, type: 'bounce' },
    // Exit platform (top right)
    { x: 660, y: 110, w: 140, h: 40, type: 'exit' },
  ];
  platforms.forEach(p => { p.animFrame = 0; p.animTick = 0; p.bounceAnim = 0; });

  // Enemies — 5 beetles patrolling
  enemies = [
    { x: 350, y: 390, w: 55, h: 55, vx: -1, hp: 3, maxHp: 3, state: 'walk', frame: 0, frameTick: 0, facing: -1, attackCooldown: 0, hurtTimer: 0, dead: false, score: 150 },
    { x: 600, y: 390, w: 55, h: 55, vx: 1,  hp: 3, maxHp: 3, state: 'walk', frame: 0, frameTick: 0, facing: 1,  attackCooldown: 0, hurtTimer: 0, dead: false, score: 150 },
    { x: 310, y: 220, w: 55, h: 55, vx: -1, hp: 4, maxHp: 4, state: 'walk', frame: 0, frameTick: 0, facing: -1, attackCooldown: 0, hurtTimer: 0, dead: false, score: 200 },
    { x: 540, y: 270, w: 55, h: 55, vx: 1,  hp: 4, maxHp: 4, state: 'walk', frame: 0, frameTick: 0, facing: 1,  attackCooldown: 0, hurtTimer: 0, dead: false, score: 200 },
    { x: 490, y: 130, w: 55, h: 55, vx: -1, hp: 5, maxHp: 5, state: 'walk', frame: 0, frameTick: 0, facing: -1, attackCooldown: 0, hurtTimer: 0, dead: false, score: 300 },
  ];

  // Ambient FX positions
  ambientFx = [
    { type: 'drop',   x: 200, y: 80,  frame: 0, tick: 0, rate: 6 },
    { type: 'drop',   x: 500, y: 50,  frame: 3, tick: 0, rate: 6 },
    { type: 'drop',   x: 680, y: 70,  frame: 6, tick: 0, rate: 6 },
    { type: 'bubble', x: 350, y: 400, frame: 0, tick: 0, rate: 8, vy: -1 },
    { type: 'bubble', x: 620, y: 420, frame: 2, tick: 0, rate: 8, vy: -1 },
    { type: 'mush',   x: 130, y: 390, frame: 0, tick: 0, rate: 10 },
    { type: 'mush',   x: 460, y: 390, frame: 2, tick: 0, rate: 10 },
    { type: 'wisp',   x: 380, y: 200, frame: 0, tick: 0, rate: 7, vx: 0.3 },
    { type: 'kelp',   x: 50,  y: 380, frame: 0, tick: 0, rate: 9 },
    { type: 'kelp',   x: 720, y: 380, frame: 2, tick: 0, rate: 9 },
  ];

  particles = [];
  tick = 0;
  updateUI();
}

function updateUI() {
  document.getElementById('hpVal').textContent = Math.max(0, player.hp);
  document.getElementById('scoreVal').textContent = score;
  const alive = enemies.filter(e => !e.dead).length;
  document.getElementById('enemyVal').textContent = alive;
}

// ─── COLLISION ────────────────────────────────────────────────────────────────
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function resolveGround(entity) {
  entity.onGround = false;
  entity.y += entity.vy;
  for (const p of platforms) {
    if (p.type === 'ground' || p.type === 'bounce' || p.type === 'exit') {
      const eRect = { x: entity.x + 5, y: entity.y, w: entity.w - 10, h: entity.h };
      const pRect = { x: p.x, y: p.y, w: p.w, h: p.h };
      if (rectsOverlap(eRect, pRect)) {
        const prevBottom = entity.y + entity.h - entity.vy;
        if (prevBottom <= p.y + 5 && entity.vy >= 0) {
          entity.y = p.y - entity.h;
          entity.onGround = true;
          if (p.type === 'bounce' && entity.vy > 3) {
            entity.vy = -entity.vy * 0.6;
            p.bounceAnim = 8;
          } else {
            entity.vy = 0;
          }
        }
      }
    }
  }
  // World bounds
  if (entity.y + entity.h > H) { entity.y = H - entity.h; entity.vy = 0; entity.onGround = true; }
  if (entity.y < 0) { entity.y = 0; entity.vy = 0; }
}

// ─── UPDATE ───────────────────────────────────────────────────────────────────
function update() {
  if (!gameRunning || gameOver || gameWon) return;
  tick++;

  // ── Player input ────────────────────────────────────────────────────────────
  const left  = keys['ArrowLeft']  || keys['a'] || keys['A'];
  const right = keys['ArrowRight'] || keys['d'] || keys['D'];
  const jump  = keys['ArrowUp']    || keys['w'] || keys['W'] || keys[' '];
  const attack = keys['x'] || keys['X'] || keys['Control'];

  if (player.hurtTimer > 0) {
    player.hurtTimer--;
  } else if (player.state !== 'attack') {
    if (left)  { player.vx = -3.5; player.facing = -1; player.state = 'walk'; }
    else if (right) { player.vx = 3.5; player.facing = 1; player.state = 'walk'; }
    else { player.vx *= 0.8; if (Math.abs(player.vx) < 0.1) player.vx = 0; player.state = 'idle'; }

    if (jump && player.onGround) { player.vy = -12; player.state = 'jump'; }
    if (!player.onGround) player.state = 'jump';
    if (player.onGround && Math.abs(player.vx) > 0.5) player.state = 'walk';
    if (player.onGround && Math.abs(player.vx) < 0.5) player.state = 'idle';
  }

  if (attack && player.attackCooldown <= 0 && player.hurtTimer <= 0) {
    player.state = 'attack';
    player.attackCooldown = 40;
    player.frame = 0;
    // Attack hitbox
    const ax = player.facing === 1 ? player.x + player.w : player.x - 80;
    player.attackBox = { x: ax, y: player.y + 10, w: 80, h: 60, timer: 20 };
    // Particle
    for (let i = 0; i < 6; i++) {
      particles.push({
        x: player.x + player.w/2 + player.facing*40,
        y: player.y + 30,
        vx: (Math.random()-0.5)*5 + player.facing*3,
        vy: (Math.random()-0.5)*4,
        life: 20, maxLife: 20,
        color: `hsl(${170+Math.random()*30},100%,70%)`
      });
    }
  }
  if (player.attackCooldown > 0) {
    player.attackCooldown--;
    if (player.attackCooldown < 20) { player.attackBox = null; }
    if (player.attackCooldown === 0 && player.state === 'attack') player.state = 'idle';
  }

  // Clamp player to world
  if (player.x < 0) player.x = 0;
  if (player.x + player.w > W) player.x = W - player.w;

  player.vy += GRAVITY;
  player.x += player.vx;
  resolveGround(player);

  if (player.invincible > 0) player.invincible--;

  // ── Player animation ────────────────────────────────────────────────────────
  player.frameTick++;
  if (player.frameTick >= player.frameRate) {
    player.frameTick = 0;
    const frames = getCharFrames(player.state, player.facing);
    player.frame = (player.frame + 1) % frames.length;
  }

  // ── Enemies update ──────────────────────────────────────────────────────────
  for (const e of enemies) {
    if (e.dead) continue;

    if (e.hurtTimer > 0) { e.hurtTimer--; continue; }

    // Simple AI: patrol, aggro near player
    const dx = player.x - e.x;
    const dist = Math.abs(dx);

    if (dist < 200) {
      e.vx = dx > 0 ? 1.5 : -1.5;
      e.facing = dx > 0 ? 1 : -1;
      e.state = 'walk';
      // Attack if close
      if (dist < 65 && e.attackCooldown <= 0) {
        e.state = 'attack';
        e.attackCooldown = 60;
        if (player.invincible <= 0) {
          player.hp -= 12;
          player.hurtTimer = 20;
          player.invincible = 40;
          player.vy = -5;
          spawnHurtParticles(player.x + player.w/2, player.y + player.h/2);
          updateUI();
          if (player.hp <= 0) { triggerGameOver(); }
        }
      }
    } else {
      // Patrol
      e.vx = e.facing * 1;
    }
    if (e.attackCooldown > 0) e.attackCooldown--;
    if (e.state === 'attack' && e.attackCooldown < 45) e.state = 'walk';

    e.x += e.vx;
    // Clamp to world
    if (e.x < 0) { e.x = 0; e.facing = 1; e.vx = 1; }
    if (e.x + e.w > W) { e.x = W - e.w; e.facing = -1; e.vx = -1; }

    // Keep on platforms — simple ground snap
    let onAnyGround = false;
    for (const p of platforms) {
      const er = { x: e.x + 5, y: e.y + e.h - 2, w: e.w - 10, h: 4 };
      const pr = { x: p.x, y: p.y, w: p.w, h: p.h };
      if (er.x < pr.x + pr.w && er.x + er.w > pr.x && Math.abs(er.y - pr.y) < 10) {
        e.y = p.y - e.h;
        onAnyGround = true;
        break;
      }
    }
    if (!onAnyGround) {
      // Try to keep on ground platforms
      let nearPlat = null, minDist = Infinity;
      for (const p of platforms) {
        if (e.x + e.w/2 >= p.x && e.x + e.w/2 <= p.x + p.w) {
          const d = Math.abs(e.y + e.h - p.y);
          if (d < minDist) { minDist = d; nearPlat = p; }
        }
      }
      if (nearPlat && minDist < 60) { e.y = nearPlat.y - e.h; }
    }

    // Enemy animation
    e.frameTick++;
    if (e.frameTick >= 8) {
      e.frameTick = 0;
      const fcount = e.state === 'attack' ? (sprites.enemyAttackL?.length || 3) : (sprites.enemyWalkL?.length || 3);
      e.frame = (e.frame + 1) % fcount;
    }

    // Check player attack
    if (player.attackBox && player.invincible < 35) {
      const eRect = { x: e.x, y: e.y, w: e.w, h: e.h };
      if (rectsOverlap(player.attackBox, eRect)) {
        e.hp--;
        e.hurtTimer = 20;
        e.state = 'hurt';
        e.vy = -3;
        spawnHurtParticles(e.x + e.w/2, e.y + e.h/2, '#ff4444');
        player.attackBox = null;
        if (e.hp <= 0) {
          e.dead = true;
          score += e.score;
          spawnDeathParticles(e.x + e.w/2, e.y + e.h/2);
          updateUI();
        }
      }
    }
  }

  // ── Win condition ────────────────────────────────────────────────────────────
  const exitPlat = platforms.find(p => p.type === 'exit');
  if (exitPlat && player.onGround) {
    const onExit = player.x + player.w/2 > exitPlat.x && player.x + player.w/2 < exitPlat.x + exitPlat.w;
    const onHeight = Math.abs((player.y + player.h) - exitPlat.y) < 5;
    if (onExit && onHeight && enemies.filter(e=>!e.dead).length === 0) {
      gameWon = true;
      showEndScreen(true);
    }
  }

  // ── Ambient FX ──────────────────────────────────────────────────────────────
  for (const fx of ambientFx) {
    fx.tick++;
    if (fx.tick >= fx.rate) {
      fx.tick = 0;
      const maxF = fx.type === 'drop' ? 9 : fx.type === 'bubble' ? 5 : fx.type === 'mush' ? 4 : fx.type === 'wisp' ? 5 : 4;
      fx.frame = (fx.frame + 1) % maxF;
    }
    if (fx.type === 'bubble') {
      fx.y -= 0.3;
      if (fx.y < 50) fx.y = 450;
    }
    if (fx.type === 'wisp') {
      fx.x += fx.vx;
      if (fx.x > W - 50 || fx.x < 50) fx.vx *= -1;
    }
  }

  // ── Platform bounce anim ─────────────────────────────────────────────────────
  for (const p of platforms) {
    if (p.bounceAnim > 0) p.bounceAnim--;
    p.animTick++;
    if (p.animTick >= 12) { p.animTick = 0; p.animFrame = (p.animFrame + 1) % 3; }
  }

  // ── Particles ────────────────────────────────────────────────────────────────
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.2;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function spawnHurtParticles(x, y, color) {
  color = color || '#00ffcc';
  for (let i = 0; i < 8; i++) {
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*6,
      vy: (Math.random()-0.5)*6,
      life: 15, maxLife: 15,
      color
    });
  }
}

function spawnDeathParticles(x, y) {
  for (let i = 0; i < 16; i++) {
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*10,
      vy: Math.random()*-8,
      life: 30, maxLife: 30,
      color: `hsl(${Math.random()*30+5},100%,60%)`
    });
  }
}

// ─── DRAW ─────────────────────────────────────────────────────────────────────
function getCharFrames(state, facing) {
  if (state === 'walk') return facing === -1 ? sprites.charWalkL : sprites.charWalkR;
  if (state === 'jump') return facing === -1 ? sprites.charJumpL : sprites.charJumpR;
  if (state === 'attack') return facing === -1 ? sprites.charAttackL : sprites.charAttackR;
  if (state === 'hurt') return facing === -1 ? sprites.charHurtL : sprites.charHurtR;
  return sprites.charIdle || [];
}

function drawSprite(frames, frame, x, y, dw, dh, flipH) {
  if (!frames || frames.length === 0) return;
  const f = frames[Math.min(frame, frames.length - 1)];
  if (!f) return;
  ctx.save();
  if (flipH) {
    ctx.translate(x + dw/2, y);
    ctx.scale(-1, 1);
    ctx.drawImage(f, -dw/2, 0, dw, dh);
  } else {
    ctx.drawImage(f, x, y, dw, dh);
  }
  ctx.restore();
}

function drawBackground() {
  if (imgs.bg) {
    ctx.drawImage(imgs.bg, 0, 0, W, H);
  } else {
    // Fallback
    const grd = ctx.createLinearGradient(0, 0, 0, H);
    grd.addColorStop(0, '#001a12');
    grd.addColorStop(1, '#000a08');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);
  }
  // Overlay vignette
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.2, W/2, H/2, H*0.9);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
}

function drawPlatform(p) {
  const pxSize = p.type === 'ground' ? p.w : 80;
  const pySize = p.type === 'ground' ? p.h : 55;

  if (p.type === 'ground') {
    // Draw tiled ground using platNormal
    if (sprites.platNormal) {
      const tileW = 80;
      for (let tx = p.x; tx < p.x + p.w; tx += tileW) {
        const tw = Math.min(tileW, p.x + p.w - tx);
        ctx.drawImage(sprites.platNormal, 0, 0, sprites.platNormal.width * (tw/tileW), sprites.platNormal.height, tx, p.y, tw, p.h);
      }
    } else {
      ctx.fillStyle = '#1a3a2a';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.strokeStyle = '#00ffcc44';
      ctx.strokeRect(p.x, p.y, p.w, p.h);
    }
    return;
  }

  if (p.type === 'exit') {
    // Glowing exit
    ctx.save();
    ctx.shadowColor = '#ffcc00';
    ctx.shadowBlur = 20;
    if (sprites.platNormal) ctx.drawImage(sprites.platNormal, p.x, p.y, pxSize, pySize);
    else { ctx.fillStyle = '#332200'; ctx.fillRect(p.x, p.y, p.w, p.h); }
    ctx.restore();
    // EXIT label
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 10px Courier New';
    ctx.textAlign = 'center';
    const alive = enemies.filter(e=>!e.dead).length;
    ctx.fillText(alive === 0 ? '★ EXIT ★' : `CLEAR ${alive} MORE`, p.x + p.w/2, p.y - 5);
    ctx.textAlign = 'left';
    return;
  }

  // Bounce platform
  const frameSet = p.bounceAnim > 0 ? sprites.platBounce : sprites.platBounce;
  if (frameSet && frameSet.length > 0) {
    const f = frameSet[p.animFrame % frameSet.length];
    if (f) {
      ctx.save();
      if (p.bounceAnim > 0) {
        ctx.shadowColor = '#00ffcc';
        ctx.shadowBlur = 15;
      }
      ctx.drawImage(f, p.x, p.y, pxSize, pySize);
      ctx.restore();
      return;
    }
  }
  // Fallback
  ctx.fillStyle = p.bounceAnim > 0 ? '#004433' : '#002a1a';
  ctx.fillRect(p.x, p.y, p.w, pySize);
  ctx.strokeStyle = '#00ffcc55';
  ctx.strokeRect(p.x, p.y, p.w, pySize);
}

function drawAmbientFx() {
  for (const fx of ambientFx) {
    let frames, sz;
    if (fx.type === 'drop')   { frames = sprites.waterDrop;  sz = 30; }
    if (fx.type === 'bubble') { frames = sprites.bubbles;    sz = 40; }
    if (fx.type === 'mush')   { frames = sprites.mushPulse;  sz = 50; }
    if (fx.type === 'wisp')   { frames = sprites.wisps;      sz = 35; }
    if (fx.type === 'kelp')   { frames = sprites.kelp;       sz = 50; }
    if (!frames || frames.length === 0) continue;
    const f = frames[Math.min(fx.frame, frames.length-1)];
    if (f) {
      ctx.save();
      ctx.globalAlpha = 0.75;
      ctx.drawImage(f, fx.x - sz/2, fx.y - sz/2, sz, sz);
      ctx.restore();
    }
  }
}

function drawPlayer() {
  const frames = getCharFrames(player.state, player.facing);
  // Flicker when invincible
  if (player.invincible > 0 && tick % 4 < 2) {
    ctx.globalAlpha = 0.4;
  }
  ctx.save();
  if (player.state === 'hurt') {
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 10;
  }
  drawSprite(frames, player.frame, player.x - 10, player.y - 15, player.w + 20, player.h + 15);
  ctx.restore();
  ctx.globalAlpha = 1;

  // HP bar
  const bw = 60, bh = 5;
  const bx = player.x + (player.w - bw)/2;
  const by = player.y - 12;
  ctx.fillStyle = '#220000';
  ctx.fillRect(bx, by, bw, bh);
  ctx.fillStyle = player.hp > 50 ? '#00ff88' : player.hp > 25 ? '#ffaa00' : '#ff2200';
  ctx.fillRect(bx, by, bw * (player.hp/player.maxHp), bh);
}

function drawEnemies() {
  for (const e of enemies) {
    if (e.dead) continue;

    let frames;
    if (e.state === 'attack') frames = sprites.enemyAttackL;
    else if (e.state === 'hurt') frames = sprites.enemyHurtL;
    else frames = sprites.enemyWalkL;

    const flipH = e.facing === 1;
    ctx.save();
    if (e.state === 'attack') { ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 15; }
    if (e.state === 'hurt')   { ctx.shadowColor = '#ffffff'; ctx.shadowBlur = 10; }
    drawSprite(frames, e.frame, e.x - 5, e.y - 5, e.w + 10, e.h + 10, flipH);
    ctx.restore();

    // HP bar
    const bw = 50, bh = 4;
    const bx = e.x + (e.w - bw)/2;
    const by = e.y - 8;
    ctx.fillStyle = '#220000';
    ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = '#ff2200';
    ctx.fillRect(bx, by, bw * (e.hp/e.maxHp), bh);
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3 * alpha + 1, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawAttackBox() {
  if (player.attackBox && player.attackBox.timer > 0) {
    ctx.save();
    ctx.globalAlpha = 0.15;
    ctx.strokeStyle = '#00ffcc';
    ctx.lineWidth = 2;
    ctx.strokeRect(player.attackBox.x, player.attackBox.y, player.attackBox.w, player.attackBox.h);
    ctx.restore();
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawAmbientFx();
  for (const p of platforms) drawPlatform(p);
  drawEnemies();
  drawPlayer();
  drawAttackBox();
  drawParticles();

  // Win glow if all enemies dead
  if (enemies.filter(e=>!e.dead).length === 0) {
    ctx.save();
    ctx.shadowColor = '#ffcc00';
    ctx.shadowBlur = 30;
    ctx.strokeStyle = '#ffcc0066';
    ctx.lineWidth = 3;
    const ex = platforms.find(p=>p.type==='exit');
    if (ex) ctx.strokeRect(ex.x-5, ex.y-25, ex.w+10, ex.h+30);
    ctx.restore();
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

function triggerGameOver() {
  gameOver = true;
  setTimeout(() => showEndScreen(false), 500);
}

function showEndScreen(won) {
  const ov = document.getElementById('overlay');
  ov.innerHTML = won
    ? `<h1 style="color:#ffcc00;text-shadow:0 0 30px #ffcc00">ESCAPED!</h1>
       <p>THE GROTTO HAS BEEN CLEARED</p>
       <p style="margin-top:10px;font-size:20px;color:#00ffcc">SCORE: ${score}</p>
       <button onclick="restartGame()">PLAY AGAIN</button>`
    : `<h1 style="color:#ff2200;text-shadow:0 0 30px #ff2200">CONSUMED</h1>
       <p>THE GROTTO CLAIMS ANOTHER SOUL</p>
       <p style="margin-top:10px;font-size:20px;color:#ff6644">SCORE: ${score}</p>
       <button onclick="restartGame()">TRY AGAIN</button>`;
  ov.style.display = 'flex';
  gameRunning = false;
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  initLevel();
  gameRunning = true;
}

function restartGame() {
  document.getElementById('overlay').style.display = 'none';
  initLevel();
  gameRunning = true;
}

// ─── INPUT ────────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ([' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// ─── BOOT ─────────────────────────────────────────────────────────────────────
loadImages(() => {
  buildSprites();
  gameLoop();
});
</script>
