<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grotto Depths — Platformer</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:'Courier New',monospace; overflow:hidden; }
  #loading-screen { position:fixed; inset:0; background:#030f0a; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; }
  #loading-screen h1 { color:#3dffc0; font-size:2.5rem; letter-spacing:0.3em; text-shadow:0 0 20px #3dffc088; margin-bottom:1rem; }

  .load-bar { height:100%; width:0%; background:linear-gradient(90deg,#0d7a4e,#3dffc0); border-radius:3px; transition:width 0.3s; }

  #game-container { position:relative; width:800px; height:520px; overflow:hidden; border:2px solid #1e5c3a; box-shadow:0 0 40px #0d7a4e44, inset 0 0 60px #00000088; }
  #bg-layer { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
  #effect-canvas { position:absolute; inset:0; z-index:1; pointer-events:none; }
  #game-canvas { position:absolute; inset:0; z-index:2; }

  #hud { padding:10px 14px; }

  .start-btn { background:transparent; border:1px solid #3dffc0; color:#3dffc0; font-family:'Courier New',monospace; font-size:0.85rem; letter-spacing:0.2em; padding:10px 28px; cursor:pointer; transition:all 0.2s; }
  .start-btn:hover { background:#3dffc022; box-shadow:0 0 16px #3dffc044; }

  #sprite-debug { width:800px; background:#030f0a; border:1px solid #1e5c3a22; padding:10px 14px; margin-top:2px; }
  #sprite-debug h3 { color:#1e5c3a; font-size:10px; letter-spacing:0.15em; margin-bottom:6px; }

  .anim-tag { font-size:9px; color:#3dffc077; background:#0a2218; border:1px solid #1e5c3a33; padding:2px 8px; border-radius:3px; letter-spacing:0.08em; }

  #game-over { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; background:#00000099; z-index:10; }
  #game-over h2 { color:#ff4444; font-size:2rem; letter-spacing:0.2em; text-shadow:0 0 20px #ff4444; margin-bottom:1rem; }
  #game-over p { color:#ff444488; font-size:0.8rem; letter-spacing:0.1em; margin-bottom:1.5rem; }
</style>

<body>

<div id="loading-screen">
  <h1>GROTTO DEPTHS</h1>
  <p>LOADING SPRITES & ENVIRONMENT...</p>
  <div class="load-bar-wrap"><div class="load-bar" id="load-bar"></div></div>
  <p id="load-status" style="margin-top:8px;font-size:0.75rem;color:#3dffc044;"></p>
</div>

<div id="game-container">
  <img id="bg-layer" src="" alt="" />
  <canvas id="effect-canvas" width="800" height="520"></canvas>
  <canvas id="game-canvas" width="800" height="520"></canvas>
  <div id="ui-layer">
    <div id="hud">
      <div class="hud-row">
        <div class="hp-wrap">
          <span class="hp-label">HP</span>
          <div id="hp-bar-outer"><div id="hp-bar"></div></div>
        </div>
        <div class="score-txt">SCORE: <span id="score-val">0</span></div>
        <div class="score-txt" id="anim-label" style="color:#3dffc044;"></div>
      </div>
    </div>
    <div id="controls-hint">← → MOVE &nbsp;|&nbsp; SPACE JUMP &nbsp;|&nbsp; Z ATTACK &nbsp;|&nbsp; X SPECIAL</div>
  </div>
  <div id="start-overlay">
    <h2>GROTTO DEPTHS</h2>
    <p>ENTER THE CAVE — SURVIVE THE DARK</p>
    <button class="start-btn" id="start-btn">▶ START GAME</button>
  </div>
  <div id="game-over">
    <h2>YOU FELL</h2>
    <p>THE GROTTO CLAIMS ANOTHER SOUL</p>
    <button class="start-btn" id="restart-btn">↺ TRY AGAIN</button>
  </div>
</div>

<div id="sprite-debug">
  <h3>LOADED ANIMATIONS</h3>
  <div class="debug-row" id="anim-tags"></div>
</div>

<script>
// ─────────────────────────────────────────
// SPRITE SHEET DEFINITIONS
// All measurements are in source pixels at 1x scale
// Each sheet is loaded from the uploaded files
// ─────────────────────────────────────────

// We embed the images as object URLs from the file system paths
// Since we're in a local HTML, we reference the same directory images
// For the demo, images are referenced by their uploaded paths
const SHEETS = {
  bg:       'photo_1_2026-04-15_05-32-12.jpg',
  effects:  'photo_2_2026-04-15_05-32-12.jpg',
  player:   'photo_1_2026-04-15_05-30-12.jpg',
  enemy:    'photo_2_2026-04-15_05-30-12.jpg',
  platform: 'photo_3_2026-04-15_05-30-12.jpg',
};

// ─────────────────────────────────────────
// ANIMATION FRAME DEFINITIONS
// (frameX, frameY, frameW, frameH, frames, fps)
// Based on visual analysis of each sprite sheet
// ─────────────────────────────────────────

// PLAYER sheet: ~1024x1024, grid-based sprite sheet
// Row heights: Idle row ~top area ~340px tall (3 large frames)
// Walk rows: ~4-5 frames each ~128px wide, ~96px tall
// We define offsets based on visual layout:
const PLAYER_ANIMS = {
  // Top 3 large portraits: idle1, idle2, select
  idle:   { sx:0,   sy:0,   fw:338, fh:340, frames:2, fps:4,  cols:3 },
  // Walk left — row A: starts ~y=340, 4 frames of ~128x96
  walkL:  { sx:0,   sy:340, fw:128, fh:96,  frames:4, fps:8,  cols:4 },
  // Walk right — row E: same y, right half
  walkR:  { sx:512, sy:340, fw:128, fh:96,  frames:4, fps:8,  cols:4 },
  // Jump L — row B ~y=436
  jumpL:  { sx:0,   sy:436, fw:128, fh:96,  frames:3, fps:8,  cols:3 },
  jumpR:  { sx:512, sy:436, fw:128, fh:96,  frames:3, fps:8,  cols:3 },
  // Attack L — row C ~y=532 — chain whip
  attackL:{ sx:0,   sy:532, fw:170, fh:96,  frames:3, fps:12, cols:3 },
  attackR:{ sx:512, sy:532, fw:170, fh:96,  frames:3, fps:12, cols:3 },
  // Hurt L — row D ~y=628
  hurtL:  { sx:0,   sy:628, fw:128, fh:96,  frames:3, fps:10, cols:3 },
  hurtR:  { sx:512, sy:628, fw:128, fh:96,  frames:3, fps:10, cols:3 },
};

// ENEMY sheet: ~1024x1024, large spider-bug
// Top 3 large portraits, then walk/jump/attack/hurt rows
const ENEMY_ANIMS = {
  idle:    { sx:0,   sy:0,   fw:338, fh:340, frames:2, fps:3,  cols:3 },
  walkL:   { sx:0,   sy:340, fw:128, fh:96,  frames:4, fps:7,  cols:4 },
  walkR:   { sx:512, sy:340, fw:128, fh:96,  frames:4, fps:7,  cols:4 },
  jumpL:   { sx:0,   sy:436, fw:128, fh:96,  frames:3, fps:8,  cols:3 },
  jumpR:   { sx:512, sy:436, fw:128, fh:96,  frames:3, fps:8,  cols:3 },
  attackL: { sx:0,   sy:532, fw:170, fh:96,  frames:3, fps:12, cols:3 },
  attackR: { sx:512, sy:532, fw:170, fh:96,  frames:3, fps:12, cols:3 },
  hurtL:   { sx:0,   sy:628, fw:128, fh:96,  frames:3, fps:10, cols:3 },
  hurtR:   { sx:512, sy:628, fw:128, fh:96,  frames:3, fps:10, cols:3 },
};

// EFFECTS sheet: ~1024x1024 grid with labeled rows
// Water drop cycle: row 1 — ~8 frames, fw~90, fh~80 at y~20
// Rising bubbles: row 2 — ~5 frames fw~160 fh~100 at y~120
// Mushroom pulse: row 3 left — ~4 frames fw~190 fh~160 at y~250
// Grotto wisps: row 3 right — ~5 frames fw~100 fh~120 at x~560 y~250
// Large splash: row 4 — ~8 frames fw~110 fh~110 at y~440
// Kelp: row 5 — ~4 frames fw~120 fh~130 at y~580
// Small crab: row 6 — ~4 frames fw~115 fh~100 at y~740
const EFFECT_ANIMS = {
  waterDrop:{ sx:20,  sy:20,  fw:90,  fh:80,  frames:8, fps:10, cols:8 },
  bubbles:  { sx:20,  sy:130, fw:155, fh:100, frames:5, fps:6,  cols:5 },
  mushroom: { sx:20,  sy:255, fw:185, fh:160, frames:4, fps:5,  cols:4 },
  wisps:    { sx:565, sy:255, fw:100, fh:130, frames:5, fps:7,  cols:5 },
  splash:   { sx:20,  sy:448, fw:108, fh:110, frames:8, fps:12, cols:8 },
  kelp:     { sx:20,  sy:588, fw:115, fh:130, frames:4, fps:6,  cols:4 },
  crab:     { sx:20,  sy:750, fw:115, fh:100, frames:4, fps:8,  cols:4 },
};

// PLATFORM sheet: bouncy grotto platform
// Top 3 large states, then animation rows
const PLATFORM_ANIMS = {
  normal:   { sx:0,   sy:0,   fw:338, fh:280, frames:1, fps:1, cols:1 },
  bounce:   { sx:10,  sy:485, fw:160, fh:100, frames:3, fps:8, cols:3 },
  recoil:   { sx:10,  sy:590, fw:160, fh:100, frames:3, fps:8, cols:3 },
  particles:{ sx:10,  sy:745, fw:130, fh:120, frames:3, fps:10,cols:3 },
};

// ─────────────────────────────────────────
// IMAGE LOADING
// ─────────────────────────────────────────
const images = {};
let loadedCount = 0;
const totalImages = Object.keys(SHEETS).length;
const loadBar = document.getElementById('load-bar');
const loadStatus = document.getElementById('load-status');

function loadImages(cb) {
  Object.entries(SHEETS).forEach(([key, src]) => {
    const img = new Image();
    img.onload = () => {
      images[key] = img;
      loadedCount++;
      const pct = Math.round((loadedCount / totalImages) * 100);
      loadBar.style.width = pct + '%';
      loadStatus.textContent = `Loaded: ${src}`;
      if (loadedCount === totalImages) {
        setTimeout(() => {
          document.getElementById('loading-screen').style.display = 'none';
          cb();
        }, 400);
      }
    };
    img.onerror = () => {
      // If image can't load from relative path, try to continue
      loadedCount++;
      if (loadedCount === totalImages) {
        setTimeout(() => {
          document.getElementById('loading-screen').style.display = 'none';
          cb();
        }, 400);
      }
    };
    img.src = src;
  });
}

// ─────────────────────────────────────────
// ANIMATOR CLASS
// Handles frame advancement and drawing
// ─────────────────────────────────────────
class Animator {
  constructor(sheet, animDef, scale=1) {
    this.sheet = sheet;
    this.def = animDef;
    this.scale = scale;
    this.frame = 0;
    this.timer = 0;
    this.done = false;
    this.loop = true;
    this.onDone = null;
  }

  setAnim(animDef, loop=true, onDone=null) {
    if (this.def === animDef && !this.done) return;
    this.def = animDef;
    this.frame = 0;
    this.timer = 0;
    this.done = false;
    this.loop = loop;
    this.onDone = onDone;
  }

  update(dt) {
    if (!this.def || this.done) return;
    this.timer += dt;
    const spf = 1 / this.def.fps;
    if (this.timer >= spf) {
      this.timer -= spf;
      this.frame++;
      if (this.frame >= this.def.frames) {
        if (this.loop) {
          this.frame = 0;
        } else {
          this.frame = this.def.frames - 1;
          this.done = true;
          if (this.onDone) this.onDone();
        }
      }
    }
  }

  draw(ctx, x, y, flipX=false) {
    const d = this.def;
    if (!d || !this.sheet || !images[this.sheet]) return;
    const img = images[this.sheet];
    const col = this.frame % d.cols;
    const row = Math.floor(this.frame / d.cols);
    const sx = d.sx + col * d.fw;
    const sy = d.sy + row * d.fh;
    const dw = d.fw * this.scale;
    const dh = d.fh * this.scale;
    ctx.save();
    if (flipX) {
      ctx.translate(x + dw, y);
      ctx.scale(-1, 1);
      ctx.drawImage(img, sx, sy, d.fw, d.fh, 0, 0, dw, dh);
    } else {
      ctx.drawImage(img, sx, sy, d.fw, d.fh, x, y, dw, dh);
    }
    ctx.restore();
  }
}

// ─────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────
const gCanvas = document.getElementById('game-canvas');
const gCtx = gCanvas.getContext('2d');
const eCanvas = document.getElementById('effect-canvas');
const eCtx = eCanvas.getContext('2d');

const GRAVITY = 980;
const GROUND_Y = 420; // ground level in canvas coords

const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
window.addEventListener('keyup',   e => { keys[e.code] = false; });

let gameRunning = false;
let score = 0;
let lastTime = 0;

// Player state
const player = {
  x: 120, y: GROUND_Y,
  vx: 0, vy: 0,
  w: 60, h: 88,
  hp: 100, maxHp: 100,
  onGround: false,
  facingRight: true,
  state: 'idle', // idle, walk, jump, attack, hurt
  attackTimer: 0,
  hurtTimer: 0,
  invincible: 0,
  anim: null,
};

// Enemies array
let enemies = [];
// Effect particles
let effects = [];
// Platforms
const platforms = [
  { x: 50,  y: GROUND_Y + 20, w: 200, h: 30 },
  { x: 280, y: 330,           w: 150, h: 30 },
  { x: 480, y: 250,           w: 150, h: 30 },
  { x: 620, y: 330,           w: 150, h: 30 },
  { x: 50,  y: 200,           w: 120, h: 30 },
];

// Animators
let playerAnim, enemyAnims = [], platformAnim;
let effectAnimators = {};

function spawnEnemy(x, y) {
  const anim = new Animator('enemy', ENEMY_ANIMS.walkL, 0.45);
  enemyAnims.push(anim);
  enemies.push({
    x, y,
    vx: -60, vy: 0,
    w: 75, h: 65,
    hp: 40, maxHp: 40,
    onGround: false,
    state: 'walkL',
    facingRight: false,
    attackTimer: 0,
    hurtTimer: 0,
    anim,
    alertTimer: 0,
    dead: false,
  });
}

function spawnEffect(type, x, y, loop=true) {
  const def = EFFECT_ANIMS[type];
  if (!def) return;
  const a = new Animator('effects', def, 0.8);
  a.loop = loop;
  effects.push({ x, y, anim: a, type, life: loop ? Infinity : (def.frames / def.fps) + 0.5 });
}

function initGame() {
  score = 0;
  player.x = 120; player.y = GROUND_Y;
  player.vx = 0; player.vy = 0;
  player.hp = 100;
  player.state = 'idle';
  player.attackTimer = 0;
  player.hurtTimer = 0;
  player.invincible = 0;
  player.facingRight = true;

  enemies = [];
  enemyAnims = [];
  effects = [];

  playerAnim = new Animator('player', PLAYER_ANIMS.idle, 0.22);
  platformAnim = new Animator('platform', PLATFORM_ANIMS.bounce, 0.9);
  platformAnim.loop = true;

  // Setup effect animators for background ambiance
  effectAnimators = {
    bubbles1: new Animator('effects', EFFECT_ANIMS.bubbles, 0.55),
    bubbles2: new Animator('effects', EFFECT_ANIMS.bubbles, 0.55),
    wisps:    new Animator('effects', EFFECT_ANIMS.wisps, 0.65),
    mushroom: new Animator('effects', EFFECT_ANIMS.mushroom, 0.55),
    crab:     new Animator('effects', EFFECT_ANIMS.crab, 0.55),
    kelp1:    new Animator('effects', EFFECT_ANIMS.kelp, 0.55),
    kelp2:    new Animator('effects', EFFECT_ANIMS.kelp, 0.55),
    waterDrop:new Animator('effects', EFFECT_ANIMS.waterDrop, 0.65),
  };
  Object.values(effectAnimators).forEach(a => { a.frame = Math.floor(Math.random()*4); });

  // Spawn initial enemies
  spawnEnemy(500, GROUND_Y);
  spawnEnemy(680, 250);

  document.getElementById('score-val').textContent = '0';
  document.getElementById('hp-bar').style.width = '100%';
  document.getElementById('game-over').style.display = 'none';

  // Populate animation debug tags
  const tags = document.getElementById('anim-tags');
  tags.innerHTML = '';
  const animNames = [
    'player:idle','player:walkL/R','player:jumpL/R','player:attackL/R','player:hurtL/R',
    'enemy:idle','enemy:walkL/R','enemy:attackL/R','enemy:hurtL/R',
    'fx:bubbles','fx:wisps','fx:mushroom','fx:kelp','fx:crab','fx:waterDrop','fx:splash',
    'platform:bounce','platform:recoil'
  ];
  animNames.forEach(n => {
    const span = document.createElement('span');
    span.className = 'anim-tag';
    span.textContent = n;
    tags.appendChild(span);
  });

  if (!gameRunning) {
    gameRunning = true;
    lastTime = performance.now();
    requestAnimationFrame(loop);
  }
}

// ─────────────────────────────────────────
// COLLISION
// ─────────────────────────────────────────
function rectOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

function applyPlatformCollision(obj) {
  obj.onGround = false;
  for (const p of platforms) {
    const prevBottom = obj.y + obj.h - obj.vy * (1/60);
    const curBottom  = obj.y + obj.h;
    if (obj.x + obj.w > p.x && obj.x < p.x + p.w) {
      if (prevBottom <= p.y + 4 && curBottom >= p.y) {
        obj.y = p.y - obj.h;
        obj.vy = 0;
        obj.onGround = true;
      }
    }
  }
}

// ─────────────────────────────────────────
// UPDATE
// ─────────────────────────────────────────
function update(dt) {
  // ── Player input ──
  const attacking = player.attackTimer > 0;
  const hurting   = player.hurtTimer > 0;

  if (!attacking && !hurting) {
    let moving = false;
    if (keys['ArrowLeft'] || keys['KeyA']) {
      player.vx = -200; player.facingRight = false; moving = true;
    } else if (keys['ArrowRight'] || keys['KeyD']) {
      player.vx = 200;  player.facingRight = true;  moving = true;
    } else {
      player.vx *= 0.8;
    }

    if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && player.onGround) {
      player.vy = -520;
      spawnEffect('splash', player.x - 20, player.y + player.h - 30, false);
    }

    if (keys['KeyZ'] || keys['KeyX']) {
      player.attackTimer = 0.45;
      player.vx = 0;
      score += 1;
    }

    // Update player animation state
    if (!player.onGround) {
      player.state = player.facingRight ? 'jumpR' : 'jumpL';
    } else if (attacking) {
      player.state = player.facingRight ? 'attackR' : 'attackL';
    } else if (moving) {
      player.state = player.facingRight ? 'walkR' : 'walkL';
    } else {
      player.state = 'idle';
    }
  }

  if (player.attackTimer > 0) player.attackTimer -= dt;
  if (player.hurtTimer > 0)   player.hurtTimer -= dt;
  if (player.invincible > 0)  player.invincible -= dt;

  // Gravity + move
  player.vy += GRAVITY * dt;
  player.x += player.vx * dt;
  player.y += player.vy * dt;

  // Clamp X
  player.x = Math.max(0, Math.min(800 - player.w, player.x));

  // Ground
  if (player.y + player.h >= GROUND_Y + 50) {
    player.y = GROUND_Y + 50 - player.h;
    player.vy = 0;
    player.onGround = true;
  }
  applyPlatformCollision(player);

  // Fall off bottom = game over
  if (player.y > 560) { endGame(); return; }

  // ── Player animator ──
  const pDef = PLAYER_ANIMS[player.state] || PLAYER_ANIMS.idle;
  playerAnim.setAnim(pDef, player.state === 'idle' || player.state.startsWith('walk') || player.state.startsWith('jump'));
  playerAnim.update(dt);

  // ── Enemies ──
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (e.dead) { enemies.splice(i, 1); enemyAnims.splice(i, 1); continue; }

    // AI: patrol and detect player
    const dx = player.x - e.x;
    const dist = Math.abs(dx);

    if (dist < 300) {
      // Chase
      e.vx = dx > 0 ? 80 : -80;
      e.facingRight = dx > 0;
      e.state = e.facingRight ? 'walkR' : 'walkL';
    } else {
      e.vx *= 0.9;
      e.state = e.facingRight ? 'walkR' : 'walkL';
    }

    // Attack if close
    if (dist < 70 && player.invincible <= 0) {
      e.attackTimer = (e.attackTimer || 0) - dt;
      if ((e.attackTimer || 0) <= 0) {
        e.attackTimer = 1.5;
        e.state = e.facingRight ? 'attackR' : 'attackL';
        player.hp -= 12;
        player.hurtTimer = 0.35;
        player.invincible = 1.0;
        if (player.hp < 0) player.hp = 0;
        document.getElementById('hp-bar').style.width = (player.hp / player.maxHp * 100) + '%';
        if (player.hp <= 0) { endGame(); return; }
      }
    }

    if (e.hurtTimer > 0) e.hurtTimer -= dt;

    // Check player attack hit
    if (player.attackTimer > 0.2 && player.invincible <= 0.8) {
      const attackX = player.facingRight ? player.x + player.w : player.x - 60;
      if (rectOverlap(attackX, player.y, 80, player.h, e.x, e.y, e.w, e.h)) {
        if (!e._hitThisSwing) {
          e.hp -= 20;
          e.hurtTimer = 0.4;
          e.state = 'hurtL';
          e._hitThisSwing = true;
          score += 10;
          document.getElementById('score-val').textContent = score;
          spawnEffect('splash', e.x, e.y, false);
          if (e.hp <= 0) {
            e.dead = true;
            score += 50;
            document.getElementById('score-val').textContent = score;
            // Respawn after delay
            setTimeout(() => { if (gameRunning) spawnEnemy(Math.random() > 0.5 ? 650 : 100, GROUND_Y); }, 3000);
          }
        }
      }
    } else {
      e._hitThisSwing = false;
    }

    // Physics
    e.vy += GRAVITY * dt;
    e.x += e.vx * dt;
    e.y += e.vy * dt;
    e.x = Math.max(0, Math.min(800 - e.w, e.x));
    if (e.y + e.h >= GROUND_Y + 50) { e.y = GROUND_Y + 50 - e.h; e.vy = 0; e.onGround = true; }
    applyPlatformCollision(e);

    const eDef = ENEMY_ANIMS[e.state] || ENEMY_ANIMS.idle;
    e.anim.setAnim(eDef, true);
    e.anim.update(dt);
  }

  // ── Platform animator ──
  platformAnim.update(dt);

  // ── Background effects ──
  Object.values(effectAnimators).forEach(a => a.update(dt));

  // ── Temp effects ──
  for (let i = effects.length - 1; i >= 0; i--) {
    const ef = effects[i];
    ef.anim.update(dt);
    if (!ef.anim.loop) ef.life -= dt;
    if (ef.life <= 0) effects.splice(i, 1);
  }

  document.getElementById('anim-label').textContent = `[${player.state}]`;
}

// ─────────────────────────────────────────
// DRAW
// ─────────────────────────────────────────
function draw() {
  gCtx.clearRect(0, 0, 800, 520);
  eCtx.clearRect(0, 0, 800, 520);

  // ── Draw background effects on eCanvas ──
  // Wisps: floating top-left area
  effectAnimators.wisps.draw(eCtx, 60, 80);
  effectAnimators.wisps.draw(eCtx, 650, 120);
  // Mushrooms: lower sides
  effectAnimators.mushroom.draw(eCtx, 20, 310);
  effectAnimators.mushroom.draw(eCtx, 670, 290);
  // Kelp
  effectAnimators.kelp1.draw(eCtx, 140, 360);
  effectAnimators.kelp2.draw(eCtx, 620, 360);
  // Bubbles: middle areas
  effectAnimators.bubbles1.draw(eCtx, 340, 180);
  effectAnimators.bubbles2.draw(eCtx, 180, 250);
  // Water drop
  effectAnimators.waterDrop.draw(eCtx, 360, 30);
  effectAnimators.waterDrop.draw(eCtx, 560, 60);
  // Crab: walks on ground
  effectAnimators.crab.draw(eCtx, 700, 395);

  // ── Draw platforms on gCanvas ──
  platforms.forEach((p, i) => {
    if (!images.platform) {
      gCtx.fillStyle = '#0d7a4e44';
      gCtx.strokeStyle = '#3dffc055';
      gCtx.lineWidth = 1;
      gCtx.fillRect(p.x, p.y, p.w, p.h);
      gCtx.strokeRect(p.x, p.y, p.w, p.h);
    } else {
      // Draw platform sprite (normal state, scaled to platform width)
      const pd = PLATFORM_ANIMS.normal;
      const scaleW = p.w / pd.fw;
      const scaleH = p.h / pd.fh;
      gCtx.save();
      gCtx.translate(p.x, p.y - pd.fh * scaleH * 0.6);
      gCtx.scale(scaleW, scaleH);
      gCtx.drawImage(images.platform, pd.sx, pd.sy, pd.fw, pd.fh, 0, 0, pd.fw, pd.fh);
      gCtx.restore();
    }
  });

  // ── Draw temp effects ──
  effects.forEach(ef => {
    ef.anim.draw(gCtx, ef.x, ef.y);
  });

  // ── Draw enemies ──
  enemies.forEach(e => {
    if (e.dead) return;
    // Flash on hurt
    if (e.hurtTimer > 0 && Math.floor(e.hurtTimer * 20) % 2) {
      gCtx.save(); gCtx.globalAlpha = 0.3; 
    }
    e.anim.draw(gCtx, e.x, e.y, !e.facingRight);
    if (e.hurtTimer > 0 && Math.floor(e.hurtTimer * 20) % 2) gCtx.restore();

    // Enemy HP bar
    const barW = e.w;
    gCtx.fillStyle = '#1a0a0a';
    gCtx.fillRect(e.x, e.y - 10, barW, 5);
    gCtx.fillStyle = '#ff3333';
    gCtx.fillRect(e.x, e.y - 10, barW * (e.hp / e.maxHp), 5);
  });

  // ── Draw player ──
  if (player.invincible > 0 && Math.floor(player.invincible * 15) % 2) {
    gCtx.save(); gCtx.globalAlpha = 0.4;
  }
  playerAnim.draw(gCtx, player.x, player.y, !player.facingRight);
  if (player.invincible > 0 && Math.floor(player.invincible * 15) % 2) gCtx.restore();

  // ── Attack range visual ──
  if (player.attackTimer > 0.15) {
    const ax = player.facingRight ? player.x + player.w : player.x - 80;
    gCtx.save();
    gCtx.globalAlpha = 0.25;
    gCtx.strokeStyle = '#3dffc0';
    gCtx.lineWidth = 2;
    gCtx.beginPath();
    if (player.facingRight) {
      // Chain whip arc right
      gCtx.moveTo(player.x + player.w * 0.5, player.y + player.h * 0.4);
      gCtx.bezierCurveTo(player.x + player.w + 20, player.y + player.h * 0.2,
                          player.x + player.w + 60, player.y + player.h * 0.5,
                          player.x + player.w + 80, player.y + player.h * 0.4);
    } else {
      gCtx.moveTo(player.x + player.w * 0.5, player.y + player.h * 0.4);
      gCtx.bezierCurveTo(player.x - 20, player.y + player.h * 0.2,
                          player.x - 60, player.y + player.h * 0.5,
                          player.x - 80, player.y + player.h * 0.4);
    }
    gCtx.stroke();
    gCtx.restore();
  }

  // ── Ground line subtle ──
  gCtx.save();
  gCtx.globalAlpha = 0.08;
  gCtx.fillStyle = '#3dffc0';
  gCtx.fillRect(0, GROUND_Y + 50, 800, 70);
  gCtx.restore();
}

// ─────────────────────────────────────────
// MAIN LOOP
// ─────────────────────────────────────────
function loop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  update(dt);
  draw();
  if (gameRunning) requestAnimationFrame(loop);
}

function endGame() {
  gameRunning = false;
  document.getElementById('game-over').style.display = 'flex';
  document.getElementById('game-over').querySelector('p').textContent = `SCORE: ${score} — THE GROTTO CLAIMS ANOTHER SOUL`;
}

// ─────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────
loadImages(() => {
  document.getElementById('bg-layer').src = images.bg ? images.bg.src : '';
  document.getElementById('start-btn').addEventListener('click', () => {
    document.getElementById('start-overlay').style.display = 'none';
    initGame();
  });
  document.getElementById('restart-btn').addEventListener('click', () => {
    initGame();
  });
});
</script>
